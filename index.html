<script>
/* ============================================================
   PERSISTENCIA COMPARTIDA — Supabase (con caché local offline-first)
   Rellena estas dos constantes con los datos de tu proyecto Supabase
   (Project Settings > API). Mientras no las rellenes, la app sigue
   funcionando solo con localStorage, como antes.
   ============================================================ */
var STORE_CONFIG = {
  url: "https://crnwaixkmduxnxgqpimb.supabase.co",
  anonKey: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNybndhaXhrbWR1eG54Z3FwaW1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0MTM2MTQsImV4cCI6MjA5ODk4OTYxNH0.SNSfEWX5G0gIDNBV_Qofxy7fXy05Csa_EKMLP7mohi0",
};

var SimpleGymStore = (function () {
  function isConfigured() {
    return STORE_CONFIG.url.indexOf("YOUR_SUPABASE_URL") === -1 &&
      STORE_CONFIG.anonKey.indexOf("YOUR_SUPABASE_ANON_KEY") === -1;
  }
  function localKey(userId) { return "simplegym_cache_" + userId; }
  function readLocalCache(userId) {
    try {
      var raw = localStorage.getItem(localKey(userId));
      return raw ? JSON.parse(raw) : null;
    } catch (e) { return null; }
  }
  function writeLocalCache(userId, data) {
    try { localStorage.setItem(localKey(userId), JSON.stringify(data)); } catch (e) {}
  }
  function legacyKeyFor(userId) {
    return userId === "nava" ? "planAnualProgresoV1" : "gymAmigoProgresoV1";
  }
  function readLegacy(userId) {
    try {
      var raw = localStorage.getItem(legacyKeyFor(userId));
      return raw ? JSON.parse(raw) : null;
    } catch (e) { return null; }
  }

  async function load(userId) {
    var cached = readLocalCache(userId) || readLegacy(userId);
    if (!isConfigured()) return cached;
    try {
      var res = await fetch(
        STORE_CONFIG.url + "/rest/v1/progress?id=eq." + encodeURIComponent(userId) + "&select=data",
        { headers: { apikey: STORE_CONFIG.anonKey, Authorization: "Bearer " + STORE_CONFIG.anonKey } }
      );
      if (!res.ok) throw new Error("HTTP " + res.status);
      var rows = await res.json();
      if (rows && rows.length && rows[0].data) {
        writeLocalCache(userId, rows[0].data);
        return rows[0].data;
      }
      return cached;
    } catch (e) {
      console.warn("SimpleGymStore: sin conexión con Supabase, uso caché local.", e);
      return cached;
    }
  }

  var pending = {};
  function save(userId, data) {
    writeLocalCache(userId, data);
    if (!isConfigured()) return;
    clearTimeout(pending[userId]);
    pending[userId] = setTimeout(function () {
      fetch(STORE_CONFIG.url + "/rest/v1/progress", {
        method: "POST",
        headers: {
          apikey: STORE_CONFIG.anonKey,
          Authorization: "Bearer " + STORE_CONFIG.anonKey,
          "Content-Type": "application/json",
          Prefer: "resolution=merge-duplicates",
        },
        body: JSON.stringify([{ id: userId, data: data, updated_at: new Date().toISOString() }]),
      }).catch(function (e) { console.warn("SimpleGymStore: no se pudo sincronizar con Supabase.", e); });
    }, 600);
  }

  return { load: load, save: save, isConfigured: isConfigured };
})();

/* ============================================================
   UTILIDADES COMPARTIDAS — usadas por todas las rutinas.
   ============================================================ */
function esc(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
    return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
  });
}
function round(n) { return Math.round(n * 100) / 100; }
function todayISO() { return new Date().toISOString().slice(0, 10); }
function formatDateEs(iso) {
  var d = new Date(iso + "T00:00:00");
  return d.toLocaleDateString("es-ES", { day: "2-digit", month: "short" });
}

var CHECK_SVG = '<svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4.5L4 7.5L10 1" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
var CHEVRON_SVG = '<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 4.5L6 8L10 4.5" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';

/* ============================================================
   MOTOR DE PERIODIZACIÓN COMPARTIDO
   Cualquier rutina define sus propias "phases" (con fecha de
   inicio/fin y un "tag" de esta lista) y el motor adapta solo
   series/reps/peso — no hace falta escribir el año entero a
   mano, ni tocar este motor al crear una rutina nueva.
   ============================================================ */
var PHASE_PROFILES = {
  "Progresión":       { key: "fuerza",        label: "Fuerza",        repsMult: 1,   weightMult: 1,    setsDelta: 0 },
  "Volumen":          { key: "hipertrofia",   label: "Hipertrofia",   repsMult: 1.6, weightMult: 0.8,  setsDelta: 1 },
  "Recuperación":     { key: "descarga",      label: "Descarga",      repsMult: 1,   weightMult: 0.88, setsDelta: -1 },
  "Mantenimiento":    { key: "mantenimiento", label: "Mantenimiento", repsMult: 1,   weightMult: 1,    setsDelta: 0 },
  "Test de progreso": { key: "test",          label: "Test",          repsMult: 0.7, weightMult: 1.05, setsDelta: -1 },
};
function getPhaseProfile(tag) { return PHASE_PROFILES[tag] || PHASE_PROFILES["Progresión"]; }
function getPhase(phases, dateISO) {
  var t = new Date(dateISO + "T00:00:00").getTime();
  var first = new Date(phases[0].start + "T00:00:00").getTime();
  if (t < first) return phases[0];
  for (var i = 0; i < phases.length; i++) {
    var p = phases[i];
    var s = new Date(p.start + "T00:00:00").getTime();
    var e = new Date(p.end + "T23:59:59").getTime();
    if (t >= s && t <= e) return p;
  }
  return phases[phases.length - 1];
}
function getWeekNumber(phases, dateISO) {
  var start = new Date(phases[0].start + "T00:00:00").getTime();
  var t = new Date(dateISO + "T00:00:00").getTime();
  var diff = Math.floor((t - start) / 86400000);
  return Math.min(52, Math.max(1, Math.floor(diff / 7) + 1));
}
function trainingDayForToday(dayIdsByWeekday) {
  return dayIdsByWeekday[new Date().getDay()] || null;
}
function nextTrainingDay(dayIdsByWeekday, fromJsDay) {
  for (var add = 1; add <= 7; add++) {
    var d = (fromJsDay + add) % 7;
    if (dayIdsByWeekday[d]) return dayIdsByWeekday[d];
  }
  var firstKey = Object.keys(dayIdsByWeekday)[0];
  return dayIdsByWeekday[firstKey];
}

/* ============================================================
   GRUPOS MUSCULARES Y BIBLIOTECA DE EJERCICIOS — compartidos por
   todas las rutinas, para que el autocompletado al editar y el
   selector de grupo muscular tengan siempre el máximo de opciones.
   ============================================================ */
var muscleColors = {
  "Pecho": "#FF6B35", "Pecho sup.": "#FF6B35", "Pecho inf.": "#FF6B35",
  "Espalda": "#C8FF00", "Dorsal": "#A3E635", "Espalda alta": "#84CC16",
  "Hombro": "#38BDF8", "Hombro lat.": "#38BDF8", "Hombro post.": "#38BDF8",
  "Bíceps": "#E879F9", "Tríceps": "#E879F9", "Antebrazo": "#C084FC",
  "Cuádriceps": "#FB923C", "Isquios": "#FB923C", "Glúteo": "#F472B6",
  "Gemelos": "#34D399", "Trapecio": "#FBBF24", "Core": "#94A3B8",
};
var EXERCISE_LIBRARY = [
  { name: "Press Banca Barra", muscle: "Pecho" },
  { name: "Press Banca Mancuerna", muscle: "Pecho" },
  { name: "Press Plano Mancuerna", muscle: "Pecho" },
  { name: "Press Plano (máquina/mancuerna)", muscle: "Pecho" },
  { name: "Aperturas en Máquina (Pec-Deck)", muscle: "Pecho" },

/* ============================================================
   REGISTRO DE PERFILES — para añadir una persona nueva con su
   propia rutina, basta con crear su propio *_CONFIG (fases,
   días, ejercicios, biblioteca si hace falta) y registrarlo
   aquí. El motor (periodización, edición, hoy por defecto,
   persistencia) se reutiliza automáticamente sin tocar código.
   ============================================================ */
var PROFILES = {
  nava: { label: "Nava", sub: "3 Upper · 1 Pierna", color: "#C8FF00", config: NAVA_CONFIG },
  cristian: { label: "Cristian", sub: "PPL · Recomp", color: "#38BDF8", config: CRISTIAN_CONFIG },
};
/* Perfiles "de fábrica" (código) vs. creados por el usuario (persistidos aparte,
   ver saveCustomProfiles/loadCustomProfiles más abajo). */
var STATIC_PROFILE_IDS = { nava: true, cristian: true };

/* ============================================================
   MOTOR GENÉRICO DE LA APP — una sola implementación compartida
   por todas las rutinas registradas en PROFILES.
   ============================================================ */
function initProfileApp(profile, initialData) {
  var days = profile.days;
  var phases = profile.phases;
  var weekDaysList = profile.weekDaysList;
  var overviewRows = profile.overviewRows;
  var dayIdsByWeekday = profile.dayIdsByWeekday;
  var header = profile.header;
  var weightColumnLabel = profile.weightColumnLabel || "PESO";
  var currentProfile = getPhaseProfile(getPhase(phases, todayISO()).tag);

  function buildDefaultProgress() {
    var exercises = {};
    days.forEach(function (day) {
      day.exercises.forEach(function (ex) {
        if (ex.trackable) exercises[ex.id] = { top: ex.baseTop, history: [] };
      });
    });
    return { exercises: exercises, overrides: {}, removed: {}, custom: {} };
  }

  function normalize(raw) {
    var def = buildDefaultProgress();
    var parsed = raw || {};
    return {
      exercises: Object.assign({}, def.exercises, parsed.exercises || {}),
      overrides: parsed.overrides || {},
      removed: parsed.removed || {},
      custom: parsed.custom || {},
    };
  }

  function saveProgress(p) {
    progress = p;
    SimpleGymStore.save(profile.id, p);
  }

  function getPyramid(ex, prog) {
    if (!ex.trackable) return ex.staticPyramid;
    var entry = prog.exercises[ex.id];
    var top = entry ? entry.top : ex.baseTop;
    var base = ex.repsPattern.map(function (reps, i) {
      return { reps: reps, weight: top + ex.offsets[i] };
    });
    var rows = base.map(function (r) {
      return { reps: Math.max(1, Math.round(r.reps * currentProfile.repsMult)), weight: round(r.weight * currentProfile.weightMult) };
    });
    if (currentProfile.setsDelta > 0) {
      var first = rows[0];
      rows.unshift({ reps: Math.round(first.reps * 1.3), weight: round(first.weight * 0.85) });
    } else if (currentProfile.setsDelta < 0 && rows.length > 2) {
      rows.shift();
    }
    return rows.map(function (r, i) { return { set: i + 1, reps: r.reps, weight: r.weight + " kg" }; });
  }

  function findExercise(exId) {
    for (var d = 0; d < days.length; d++) {
      for (var e = 0; e < days[d].exercises.length; e++) {
        if (days[d].exercises[e].id === exId) return days[d].exercises[e];
      }
    }
    return null;
  }

  /* ---------------- STATE ---------------- */
  var activeDay = trainingDayForToday(dayIdsByWeekday) || nextTrainingDay(dayIdsByWeekday, new Date().getDay());
  var checked = {};
  var expanded = {};
  var progress = normalize(initialData);
  var editingId = null;
  var toastMsg = "";
  var toastTimeout = null;
  var planOpen = false;
  var confirmReset = false;
  var confirmResetTimeout = null;
  var editMode = false;

  /* ---------------- EDICIÓN DE RUTINA ---------------- */
  function effectiveExercises(day, prog) {
    var list = [];
    day.exercises.forEach(function (ex) {
      if (prog.removed[ex.id]) return;
      list.push({ key: ex.id, base: ex, custom: false });
    });
    (prog.custom[day.id] || []).forEach(function (key) {
      list.push({ key: key, base: null, custom: true });
    });
    return list;
  }

  function getDisplayData(item, prog) {
    var ov = prog.overrides[item.key];
    if (ov) {
      return {
        name: ov.name,
        muscle: ov.muscle || (item.base && item.base.muscle) || "Core",
        note: item.base ? item.base.note : "Ejercicio añadido por ti.",
        pyramid: ov.sets.map(function (s, i) { return { set: i + 1, reps: s.reps, weight: s.weight }; }),
        trackable: false,
      };
    }
    var ex = item.base;
    return { name: ex.name, muscle: ex.muscle, note: ex.note, pyramid: getPyramid(ex, prog), trackable: ex.trackable };
  }

  function ensureOverride(key) {
    if (!progress.overrides[key]) {
      var ex = findExercise(key);
      if (ex) {
        var basePyramid = getPyramid(ex, progress);
        progress.overrides[key] = {
          name: ex.name,
          muscle: ex.muscle,
          sets: basePyramid.map(function (p) { return { reps: String(p.reps), weight: String(p.weight) }; }),
        };
      } else {
        progress.overrides[key] = { name: "Nuevo ejercicio", muscle: "Core", sets: [{ reps: "10", weight: "0 kg" }] };
      }
    }
    return progress.overrides[key];
  }

  function app_toggleEditMode() { editMode = !editMode; render(); }

  function app_updateExerciseName(key, value) {
    var ov = ensureOverride(key);
    ov.name = value;
    var match = findLibraryExercise(value);
    if (match) ov.muscle = match.muscle;
    saveProgress(progress);
    render();
  }

  function app_updateExerciseMuscle(key, value) {
    var ov = ensureOverride(key);
    ov.muscle = value;
    saveProgress(progress);
    render();
  }

  function app_updateSetField(key, idx, field, value) {
    var ov = ensureOverride(key);
    ov.sets[idx][field] = value;
    saveProgress(progress);
    render();
  }

  function app_addSet(key) {
    var ov = ensureOverride(key);
    var last = ov.sets[ov.sets.length - 1] || { reps: "10", weight: "0 kg" };
    ov.sets.push({ reps: last.reps, weight: last.weight });
    saveProgress(progress);
    render();
  }

  function app_removeSet(key, idx) {
    var ov = ensureOverride(key);
    if (ov.sets.length <= 1) { showToast("Debe quedar al menos 1 serie."); return; }
    ov.sets.splice(idx, 1);
    saveProgress(progress);
    render();
  }

  function app_addExercise(dayId) {
    var id = "custom-" + dayId + "-" + Date.now();
    progress.overrides[id] = { name: "Nuevo ejercicio", muscle: "Core", sets: [{ reps: "10", weight: "0 kg" }] };
    if (!progress.custom[dayId]) progress.custom[dayId] = [];
    progress.custom[dayId].push(id);
    saveProgress(progress);
    expanded[dayId + "-" + id] = true;
    render();
  }

  function app_removeExercise(key) {
    var ex = findExercise(key);
    if (ex) {
      progress.removed[key] = true;
    } else {
      progress.custom[activeDay] = (progress.custom[activeDay] || []).filter(function (k) { return k !== key; });
    }
    delete progress.overrides[key];
    saveProgress(progress);
    render();
  }

  function app_restoreRemoved(dayId) {
    var day = days.filter(function (d) { return d.id === dayId; })[0];
    if (!day) return;
    day.exercises.forEach(function (ex) { delete progress.removed[ex.id]; });
    saveProgress(progress);
    render();
  }

  /* ---------------- ACTIONS ---------------- */
  function app_setActiveDay(id) { activeDay = id; expanded = {}; editingId = null; render(); }
  function app_toggleCheck(i) { var k = activeDay + "-" + i; checked[k] = !checked[k]; render(); }
  function app_toggleExpand(i) { var k = activeDay + "-" + i; expanded[k] = !expanded[k]; render(); }
  function app_togglePlan() { planOpen = !planOpen; render(); }
  function app_openLogger(exId) { editingId = exId; render(); }
  function app_cancelLogger() { editingId = null; render(); }

  function showToast(msg) {
    toastMsg = msg;
    clearTimeout(toastTimeout);
    toastTimeout = setTimeout(function () { toastMsg = ""; render(); }, 3000);
    render();
  }

  function app_saveLog(exId) {
    var ex = findExercise(exId);
    if (!ex) return;
    var wEl = document.getElementById("inp-weight");
    var rEl = document.getElementById("inp-reps");
    var w = parseFloat(String(wEl.value).replace(",", "."));
    var r = parseInt(rEl.value, 10);
    if (isNaN(w) || isNaN(r)) { showToast("Revisa los números introducidos."); return; }
    var prevEntry = progress.exercises[ex.id] || { top: ex.baseTop, history: [] };
    var pyramid = getPyramid(ex, progress);
    var targetReps = pyramid[pyramid.length - 1].reps;
    var reached = r >= targetReps;
    var canProgress = currentProfile.key === "fuerza" || currentProfile.key === "test";
    var newTop = prevEntry.top;
    var msg;
    if (canProgress) {
      newTop = reached ? round(w + ex.step) : round(w);
      msg = reached ? "Guardado ✓ Próxima vez: " + newTop + " kg" : "Guardado ✓ Repetimos " + newTop + " kg la próxima";
    } else {
      msg = "Guardado ✓ (fase de " + currentProfile.label.toLowerCase() + " — el peso de fuerza no cambia, solo queda en tu historial)";
    }
    var newHistory = (prevEntry.history || []).concat([{ date: todayISO(), weight: w, reps: r }]).slice(-10);
    progress.exercises[ex.id] = { top: newTop, history: newHistory };
    saveProgress(progress);
    editingId = null;
    showToast(msg);
  }

  function app_handleReset() {
    if (!confirmReset) {
      confirmReset = true;
      clearTimeout(confirmResetTimeout);
      confirmResetTimeout = setTimeout(function () { confirmReset = false; render(); }, 4000);
      render();
      return;
    }
    saveProgress(buildDefaultProgress());
    confirmReset = false;
    showToast("Progreso reiniciado.");
  }

  /* ---------------- RENDER ---------------- */
  function render() {
    var app = document.getElementById("app");
    var today = todayISO();
    var currentPhase = getPhase(phases, today);
    var weekNumber = getWeekNumber(phases, today);
    var day = days.filter(function (d) { return d.id === activeDay; })[0] || days[0];
    var effList = effectiveExercises(day, progress);
    var done = effList.filter(function (item) { return checked[activeDay + "-" + item.key]; }).length;
    var total = effList.length;
    var pct = total ? Math.round((done / total) * 100) : 0;

    document.body.style.background = day.bg;

    var html = "";

    if (toastMsg) html += '<div class="toast">' + toastMsg + "</div>";

    html += '<div class="wrap">';

    /* header */
    html += '<div class="header">' +
      '<div class="glow" style="background:' + day.accent + '"></div>' +
      '<div class="eyebrow">' + header.eyebrow + "</div>" +
      '<div class="title">' + header.titleHtml(day.accent) + "</div>" +
      '<div class="subtitle">' + header.subtitle(weekNumber, currentPhase) + "</div>" +
      '<div class="phasepill" style="background:' + currentPhase.color + '15;border:1px solid ' + currentPhase.color + '40" onclick="app_togglePlan()">' +
        '<span class="dot" style="background:' + currentPhase.color + '"></span>' +
        '<span style="font-size:12px;font-weight:700;color:' + currentPhase.color + '">' + currentPhase.name + "</span>" +
        '<span style="font-size:10px;color:rgba(255,255,255,0.35)">· ' + currentPhase.tag + "</span>" +
        '<span class="chevron' + (planOpen ? " open" : "") + '">' + CHEVRON_SVG + "</span>" +
      "</div>";

    if (planOpen) {
      html += '<div class="planpanel" style="border:1px solid ' + currentPhase.color + '30">' +
        '<div class="plandesc">' + currentPhase.desc + "</div>";
      if (profile.runInfo) {
        html += '<div class="planlabel">CARRERA</div>' +
          '<div class="runbox"><div class="runtext">' + profile.runInfo + "</div></div>";
      }
      html += '<div class="planlabel">' + profile.planPanelLabel + "</div>";
      phases.forEach(function (p) {
        var isCurrent = p.id === currentPhase.id;
        html += '<div class="phaserow" style="opacity:' + (isCurrent ? 1 : 0.55) + '">' +
          '<div class="phaseleft">' +
            '<span class="dot" style="background:' + p.color + '"></span>' +
            '<span class="phasename' + (isCurrent ? " current" : "") + '">' + p.name + "</span>" +
            (isCurrent ? '<span class="heretag" style="color:' + p.color + '">ESTÁS AQUÍ</span>' : "") +
          "</div>" +
          '<span class="phasedate">' + formatDateEs(p.start) + " – " + formatDateEs(p.end) + "</span>" +
        "</div>";
      });
      html += "</div>";
    }

    var todayTrainDay = trainingDayForToday(dayIdsByWeekday);
    if (!todayTrainDay) {
      var nxtId = nextTrainingDay(dayIdsByWeekday, new Date().getDay());
      var nxtDay = days.filter(function (d) { return d.id === nxtId; })[0];
      html += '<div class="restday-note">Hoy es día de descanso. Tu próximo entreno: <b>' + nxtDay.fullName + " · " + nxtDay.type + "</b></div>";
    }

    html += '<div class="weekpills">';
    weekDaysList.forEach(function (w) {
      var isActive = w.id === activeDay;
      var bg = isActive ? day.accent : (w.active ? "rgba(255,255,255,0.07)" : "transparent");
      var color = isActive ? "#000" : (w.active ? "rgba(255,255,255,0.5)" : "rgba(255,255,255,0.15)");
      var border = isActive ? "none" : (w.active ? "1px solid rgba(255,255,255,0.1)" : "none");
      var cursor = w.active ? "pointer" : "default";
      var click = (w.active && w.id) ? ' onclick="app_setActiveDay(\'' + w.id + '\')"' : "";
      html += '<div class="daybtn" style="background:' + bg + ";color:" + color + ";border:" + border + ";cursor:" + cursor + '"' + click + ">" + w.label + "</div>";
    });
    html += "</div></div>";

    /* day card */
    html += '<div class="daycard-wrap"><div class="daycard" style="border:1px solid ' + day.accent + '30">' +
      '<div class="daycard-top"><div>' +
        '<div class="typebadge" style="background:' + day.accent + "20;border:1px solid " + day.accent + '40">' +
          '<span class="t1" style="color:' + day.accent + '">' + day.type + "</span>" +
          '<span class="sep" style="background:' + day.accent + '"></span>' +
          '<span class="t2" style="color:' + day.accent + '">' + day.tag.toUpperCase() + "</span>" +
          '<span class="sep" style="background:' + day.accent + '"></span>' +
          '<span class="t2" style="color:' + currentPhase.color + '">MODO ' + currentProfile.label.toUpperCase() + "</span>" +
        "</div>" +
        '<div class="dayname">' + day.fullName + "</div>" +
        '<div class="daysub">' + day.subtitle + "</div>" +
      "</div>" +
      '<div class="pctbox">' +
        '<div class="pctnum" style="color:' + ((done === total && done > 0) ? day.accent : "rgba(255,255,255,0.2)") + '">' + pct + "%</div>" +
        '<div class="pctlabel">' + done + "/" + total + " HECHOS</div>" +
      "</div></div>" +
      '<div class="barbg"><div class="barfill" style="width:' + pct + "%;background:linear-gradient(90deg, " + day.accent + "aa, " + day.accent + ')"></div></div>' +
      '<div class="focus">' + day.focus + "</div>" +
      '<div class="editbar"><div class="editbtn" style="background:' + (editMode ? day.accent : "rgba(255,255,255,0.06)") + ";color:" + (editMode ? "#000" : "rgba(255,255,255,0.5)") + '" onclick="app_toggleEditMode()">' + (editMode ? "✓ Listo" : "✎ Editar rutina") + "</div></div>" +
    "</div></div>";

    /* exercises */
    html += '<datalist id="exlib-list">' + EXERCISE_LIBRARY.map(function (e) { return '<option value="' + esc(e.name) + '">'; }).join("") + "</datalist>";
    html += '<div class="exlist">';
    effList.forEach(function (item) {
      var key = item.key;
      var data = getDisplayData(item, progress);
      var stateKey = activeDay + "-" + key;
      var isDone = checked[stateKey];
      var isOpen = expanded[stateKey];
      var mc = muscleColors[data.muscle] || "#888";
      var pyramid = data.pyramid;
      var entry = data.trackable ? progress.exercises[key] : null;
      var lastLog = entry && entry.history.length ? entry.history[entry.history.length - 1] : null;
      var isEditingLog = editingId === key;

      html += '<div class="excard" style="background:' + (isDone ? "rgba(255,255,255,0.02)" : "rgba(255,255,255,0.05)") +
        ";border:1px solid " + (isDone ? "rgba(255,255,255,0.05)" : "rgba(255,255,255,0.09)") + ";opacity:" + (isDone ? 0.45 : 1) + '">' +
        '<div class="exhead">' +
          '<div class="chk" style="border:2px solid ' + (isDone ? day.accent : "rgba(255,255,255,0.15)") + ";background:" + (isDone ? day.accent : "transparent") + '" onclick="app_toggleCheck(\'' + key + '\')">' + (isDone ? CHECK_SVG : "") + "</div>" +
          '<div class="exinfo" onclick="app_toggleExpand(\'' + key + '\')">' +
            (editMode ?
              '<div class="exname-row">' +
                '<input list="exlib-list" class="exname-input" value="' + esc(data.name) + '" onchange="app_updateExerciseName(\'' + key + '\', this.value)" onclick="event.stopPropagation()">' +
              "</div>" +
              '<div class="exname-row" style="margin-top:6px">' +
                '<select class="muscle-select" onchange="app_updateExerciseMuscle(\'' + key + '\', this.value)" onclick="event.stopPropagation()">' + muscleOptions(data.muscle) + "</select>" +
                '<span class="muscletag" style="background:' + mc + "20;color:" + mc + '">' + esc(data.muscle).toUpperCase() + "</span>" +
              "</div>"
              :
              '<div class="exname-row">' +
                '<span class="exname" style="color:' + (isDone ? "rgba(255,255,255,0.3)" : "#fff") + ";text-decoration:" + (isDone ? "line-through" : "none") + '">' + esc(data.name) + "</span>" +
                '<span class="muscletag" style="background:' + mc + "20;color:" + mc + '">' + esc(data.muscle).toUpperCase() + "</span>" +
              "</div>"
            ) +
            '<div class="exmeta">' + pyramid.length + " series · " + esc(pyramid[0].reps) + "→" + esc(pyramid[pyramid.length - 1].reps) + " reps" +
              (lastLog ? " · Últ: " + lastLog.weight + " kg×" + lastLog.reps + " (" + formatDateEs(lastLog.date) + ")" : "") +
            "</div>" +
          "</div>" +
          '<div class="expbtn" style="transform:' + (isOpen ? "rotate(180deg)" : "rotate(0deg)") + '" onclick="app_toggleExpand(\'' + key + '\')">' + CHEVRON_SVG + "</div>" +
        "</div>";

      if (isOpen) {
        html += '<div class="pyramid">';
        if (editMode) {
          html += '<div class="pyhead-edit"><span>SER</span><span>REPS</span><span>' + weightColumnLabel + "</span><span></span></div>";
          pyramid.forEach(function (p, pi) {
            html += '<div class="pyrow-edit">' +
              '<span class="pyset" style="color:' + day.accent + '">' + p.set + "</span>" +
              '<input class="pysmallin" value="' + esc(p.reps) + '" onchange="app_updateSetField(\'' + key + '\', ' + pi + ', \'reps\', this.value)">' +
              '<input class="pysmallin" value="' + esc(p.weight) + '" onchange="app_updateSetField(\'' + key + '\', ' + pi + ', \'weight\', this.value)">' +
              '<div class="setdel" onclick="app_removeSet(\'' + key + '\', ' + pi + ')">×</div>' +
            "</div>";
          });
          html += '<div class="addsetbtn" onclick="app_addSet(\'' + key + '\')">+ Añadir serie</div>';
        } else {
          html += '<div class="pyhead"><span>SER</span><span>REPS</span><span>' + weightColumnLabel + '</span><span style="text-align:right">INT.</span></div>';
          pyramid.forEach(function (p, pi) {
            var intensity = Math.round(((pi + 1) / pyramid.length) * 100);
            var denom = (pyramid.length - 1) || 1;
            var opSet = 0.5 + (pi / denom) * 0.5;
            var opInt = 0.4 + (pi / denom) * 0.6;
            html += '<div class="pyrow">' +
              '<span class="pyset" style="color:' + day.accent + ";opacity:" + opSet + '">' + p.set + "</span>" +
              '<span class="pyreps">' + esc(p.reps) + "</span>" +
              '<span class="pyweight">' + esc(p.weight) + "</span>" +
              '<div class="pyint"><span style="color:' + day.accent + ";opacity:" + opInt + '">' + (data.trackable ? intensity + "%" : "—") + "</span></div>" +
            "</div>";
          });
        }
        html += '<div class="tip">' + esc(data.note) + "</div>";

        if (editMode) {
          html += '<div class="exdelbtn" onclick="app_removeExercise(\'' + key + '\')">🗑 Eliminar este ejercicio</div>';
        } else if (data.trackable) {
          html += '<div class="logwrap">';
          if (!isEditingLog) {
            html += '<div class="logbtn" style="background:' + day.accent + "15;border:1px solid " + day.accent + "35;color:" + day.accent + '" onclick="app_openLogger(\'' + key + '\')">✎ Registrar lo que hiciste hoy</div>';
          } else {
            html += '<div class="logform-row">' +
              '<div class="logform-col"><div class="logform-label">PESO (KG)</div>' +
                '<input id="inp-weight" class="numin" type="number" inputmode="decimal" step="0.5" value="' + parseFloat(pyramid[pyramid.length - 1].weight) + '"></div>' +
              '<div class="logform-col"><div class="logform-label">REPS EN LA ÚLTIMA SERIE</div>' +
                '<input id="inp-reps" class="numin" type="number" inputmode="numeric" step="1" value="' + pyramid[pyramid.length - 1].reps + '"></div>' +
            "</div>" +
            '<div class="logform-actions">' +
              '<div class="logform-btn" style="background:' + day.accent + ';color:#000" onclick="app_saveLog(\'' + key + '\')">Guardar</div>' +
              '<div class="logform-btn" style="background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.6)" onclick="app_cancelLogger()">Cancelar</div>' +
            "</div>";
          }
          html += "</div>";
        }
        html += "</div>";
      }
      html += "</div>";
    });
    if (editMode) {
      var anyRemoved = day.exercises.some(function (ex) { return progress.removed[ex.id]; });
      if (anyRemoved) {
        html += '<div class="restorebtn" onclick="app_restoreRemoved(\'' + day.id + '\')">↺ Restaurar ejercicios eliminados de este día</div>';
      }
      html += '<div class="addexbtn" onclick="app_addExercise(\'' + day.id + '\')">+ Añadir ejercicio</div>';
    }
    html += "</div>";

    /* weekly overview */
    html += '<div class="overview"><div class="overview-title">VISIÓN SEMANAL</div>';
    overviewRows.forEach(function (row) {
      var dim = row.accent === "#333" || row.accent === "#222";
      html += '<div class="overow"><div class="overleft"><span class="overdot" style="background:' + row.accent + '"></span>' +
        '<span class="overday" style="color:' + (dim ? "rgba(255,255,255,0.3)" : "rgba(255,255,255,0.8)") + '">' + row.day + "</span></div>" +
        '<div><span class="overtype" style="color:' + (dim ? "rgba(255,255,255,0.3)" : row.accent) + '">' + row.type + "</span>" +
        '<span class="overtag">' + row.tag + "</span></div></div>";
    });
    html += "</div>";

    /* progression rule */
    var ruleText = currentPhase.rule || (
      currentPhase.tag === "Mantenimiento"
      ? "Estás en fase de mantenimiento. No busques subir peso: repite lo que puedas, con buena técnica, sin agobios."
      : currentPhase.tag === "Recuperación"
      ? "Semana de descarga: los pesos y series de abajo YA están reducidos automáticamente (~12% menos peso, una serie menos). Es parte del plan, no un retroceso."
      : currentPhase.tag === "Volumen"
      ? "Bloque de hipertrofia: más reps y algo menos de peso, ya calculado automáticamente. Descansa 60–90 seg y prioriza sentir el músculo."
      : currentPhase.tag === "Test de progreso"
      ? "Semana de test: pesos algo más altos, menos series. Prueba tus máximos con calma y buena técnica."
      : 'Cuando completes todas las reps de la última serie → pulsa "Registrar" y sube el peso. Sin llegar al tope, repite el mismo peso. Así de simple.'
    );

    html += '<div class="rulebox" style="background:' + day.accent + "10;border:1px solid " + day.accent + '25">' +
      '<div class="rulelabel" style="color:' + day.accent + '">REGLA DE PROGRESIÓN · ' + currentPhase.name.toUpperCase() + "</div>" +
      '<div class="ruletext">' + ruleText + "</div>" +
    "</div>";

    /* footer */
    html += '<div class="footer"><div class="resetlink" style="color:' + (confirmReset ? "#FF6B35" : "rgba(255,255,255,0.2)") + '" onclick="app_handleReset()">' +
      (confirmReset ? "¿Seguro? Toca de nuevo para reiniciar" : "Reiniciar progreso guardado") +
    '</div><div class="resetlink" onclick="switchUser()">Cambiar de usuario</div></div>';

    html += "</div>";

    app.innerHTML = html;
  }

  window.app_togglePlan = app_togglePlan;
  window.app_setActiveDay = app_setActiveDay;
  window.app_toggleCheck = app_toggleCheck;
  window.app_toggleExpand = app_toggleExpand;
  window.app_toggleEditMode = app_toggleEditMode;
  window.app_updateExerciseName = app_updateExerciseName;
  window.app_updateExerciseMuscle = app_updateExerciseMuscle;
  window.app_updateSetField = app_updateSetField;
  window.app_removeSet = app_removeSet;
  window.app_addSet = app_addSet;
  window.app_removeExercise = app_removeExercise;
  window.app_addExercise = app_addExercise;
  window.app_restoreRemoved = app_restoreRemoved;
  window.app_openLogger = app_openLogger;
  window.app_saveLog = app_saveLog;
  window.app_cancelLogger = app_cancelLogger;
  window.app_handleReset = app_handleReset;
  render();
}

/* ============================================================
   SELECCIÓN DE USUARIO Y ARRANQUE
   ============================================================ */
function getStoredUser() {
  try { return localStorage.getItem("simplegym_current_user") || ""; } catch (e) { return ""; }
}
function setStoredUser(u) {
  try { localStorage.setItem("simplegym_current_user", u); } catch (e) {}
}
function paramUser() {
  var m = new RegExp("[?&]u=(" + Object.keys(PROFILES).join("|") + ")").exec(location.search);
  return m ? m[1] : "";
}

/* ---------------- Crear una rutina nueva desde cero ----------------
   Una rutina creada por el usuario es solo otra entrada en PROFILES,
   con un *_CONFIG generado en blanco (3 días vacíos para que se llenen
   con "Editar rutina" → "+ Añadir ejercicio"). Se persiste junto al
   resto de datos (misma tabla/caché que el progreso), como un registro
   especial, para que aparezca en cualquier dispositivo. */
var CUSTOM_PROFILES_ID = "__custom_profiles__";
var customProfilesLoaded = false;
var creatingProfile = false;
var NEW_PROFILE_COLORS = ["#C8FF00", "#38BDF8", "#FF6B35", "#E879F9", "#FBBF24", "#34D399", "#A78BFA", "#F472B6"];

function slugifyId(name) {
  var base = String(name || "").trim().toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
  if (!base) base = "persona";
  var id = base, n = 2;
  while (PROFILES[id]) { id = base + "-" + n; n++; }
  return id;
}

/* config.header se persiste con datos planos (titleText); las funciones
   titleHtml/subtitle no son serializables en JSON, así que se reconstruyen
   aquí tanto al crear el perfil como al cargarlo desde el registro. */
function attachHeaderFunctions(config) {
  var h = config.header;
  if (typeof h.titleHtml !== "function") {
    var titleText = h.titleText || config.id.toUpperCase();
    h.titleHtml = function (accent) { return '<span style="color:' + accent + '">' + esc(titleText) + "</span>"; };
  }
  if (typeof h.subtitle !== "function") {
    h.subtitle = function (weekNumber) { return "Semana " + weekNumber + " de 52"; };
  }
  return config;
}

function buildBlankConfig(id, name, color) {
  var start = todayISO();
  var end = new Date();
  end.setFullYear(end.getFullYear() + 1);
  var placeholderFocus = 'Pulsa "✎ Editar rutina" y luego "+ Añadir ejercicio" para construir este día desde cero.';
  var days = ["1", "2", "3"].map(function (n) {
    return {
      id: id + "-d" + n, label: "D" + n, fullName: "DÍA " + n, type: "ENTRENO", tag: "General",
      subtitle: "Añade tus ejercicios", accent: color, bg: "#0a0a0a",
      focus: placeholderFocus, exercises: [],
    };
  });
  return attachHeaderFunctions({
    id: id,
    header: { eyebrow: "RUTINA PERSONALIZADA", titleText: name.toUpperCase() },
    planPanelLabel: "FASES DE TU PLAN",
    phases: [
      { id: 1, name: "Progresión", tag: "Progresión", start: start, end: end.toISOString().slice(0, 10), color: color,
        desc: "Rutina nueva, todavía sin ejercicios. Entra en \"Editar rutina\" en cada día para añadir los tuyos.",
        rule: "Sube peso cuando completes las reps de la última serie; si no, repite el mismo. Ve poco a poco." },
    ],
    days: days,
    weekDaysList: [
      { label: "L", id: days[0].id, active: true },
      { label: "M", active: false },
      { label: "X", id: days[1].id, active: true },
      { label: "J", active: false },
      { label: "V", id: days[2].id, active: true },
      { label: "S", active: false },
      { label: "D", active: false },
    ],
    dayIdsByWeekday: { 1: days[0].id, 3: days[1].id, 5: days[2].id },
    overviewRows: [
      { day: "Lunes", type: "Día 1", tag: "Personaliza", accent: color },
      { day: "Martes", type: "Descanso", tag: "", accent: "#222" },
      { day: "Miércoles", type: "Día 2", tag: "Personaliza", accent: color },
      { day: "Jueves", type: "Descanso", tag: "", accent: "#222" },
      { day: "Viernes", type: "Día 3", tag: "Personaliza", accent: color },
      { day: "Sábado", type: "Descanso", tag: "", accent: "#222" },
      { day: "Domingo", type: "Descanso", tag: "Recuperación", accent: "#222" },
    ],
  });
}

function serializeCustomProfiles() {
  var list = [];
  Object.keys(PROFILES).forEach(function (id) {
    if (STATIC_PROFILE_IDS[id]) return;
    var p = PROFILES[id];
    list.push({ id: id, label: p.label, sub: p.sub, color: p.color, config: p.config });
  });
  return { list: list };
}

function saveCustomProfiles() {
  SimpleGymStore.save(CUSTOM_PROFILES_ID, serializeCustomProfiles());
}

async function loadCustomProfiles() {
  if (customProfilesLoaded) return;
  customProfilesLoaded = true;
  try {
    var data = await SimpleGymStore.load(CUSTOM_PROFILES_ID);
    var list = (data && data.list) || [];
    list.forEach(function (p) {
      if (p && p.id && !PROFILES[p.id]) {
        PROFILES[p.id] = { label: p.label, sub: p.sub, color: p.color, config: attachHeaderFunctions(p.config) };
      }
    });
  } catch (e) {}
}

function renderUserPicker() {
  var app = document.getElementById("app");
  var html = '<div class="userpick">' +
    '<div class="eyebrow">SIMPLEGYM</div>' +
    '<div class="userpick-title">¿Quién eres?</div>' +
    '<div class="userpick-row">';
  Object.keys(PROFILES).forEach(function (id) {
    var u = PROFILES[id];
    html += '<div class="userpick-btn" style="background:' + u.color + '15;border:1px solid ' + u.color + '55" onclick="chooseUser(\'' + id + '\')">' +
      '<div style="font-size:18px;font-weight:800;color:' + u.color + '">' + esc(u.label) + '</div>' +
      '<div style="font-size:11px;color:rgba(255,255,255,0.4);margin-top:4px">' + esc(u.sub) + '</div>' +
    '</div>';
  });
  if (!creatingProfile) {
    html += '<div class="userpick-add" onclick="app_showCreateProfile()">+ Añadir rutina</div>';
  }
  html += '</div>';
  if (creatingProfile) {
    html += '<div class="userpick-form">' +
      '<input id="new-profile-name" class="userpick-input" placeholder="Nombre de la persona" maxlength="30">' +
      '<div class="userpick-form-actions">' +
        '<div class="userpick-form-btn" style="background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.5)" onclick="app_cancelCreateProfile()">Cancelar</div>' +
        '<div class="userpick-form-btn" style="background:#C8FF00;color:#000" onclick="app_createProfile()">Crear rutina</div>' +
      "</div>" +
    "</div>";
  }
  html += '<div class="userpick-note">Se recuerda en este dispositivo. Puedes cambiar de usuario luego desde el pie de la página.</div></div>';
  app.innerHTML = html;
  if (creatingProfile) {
    var inp = document.getElementById("new-profile-name");
    if (inp) {
      inp.focus();
      inp.addEventListener("keydown", function (e) { if (e.key === "Enter") window.app_createProfile(); });
    }
  }
}

window.chooseUser = function (id) {
  setStoredUser(id);
  boot(id);
};
window.switchUser = function () {
  setStoredUser("");
  creatingProfile = false;
  renderUserPicker();
};
window.app_showCreateProfile = function () {
  creatingProfile = true;
  renderUserPicker();
};
window.app_cancelCreateProfile = function () {
  creatingProfile = false;
  renderUserPicker();
};
window.app_createProfile = function () {
  var inp = document.getElementById("new-profile-name");
  var name = inp ? inp.value.trim() : "";
  if (!name) { if (inp) inp.focus(); return; }
  var id = slugifyId(name);
  var color = NEW_PROFILE_COLORS[Object.keys(PROFILES).length % NEW_PROFILE_COLORS.length];
  PROFILES[id] = { label: name, sub: "Rutina nueva", color: color, config: buildBlankConfig(id, name, color) };
  saveCustomProfiles();
  creatingProfile = false;
  window.chooseUser(id);
};

async function boot(forceUser) {
  await loadCustomProfiles();
  var user = forceUser || paramUser() || getStoredUser();
  if (!user || !PROFILES[user]) { renderUserPicker(); return; }
  setStoredUser(user);
  document.getElementById("app").innerHTML = '<div class="loading">CARGANDO…</div>';
  var data = await SimpleGymStore.load(user);
  initProfileApp(PROFILES[user].config, data);
}

boot();
</script>
</body>
</html>
