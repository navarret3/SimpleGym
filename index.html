<script>
/* ============================================================
   PERSISTENCIA COMPARTIDA — Supabase (con caché local offline-first)
   Rellena estas dos constantes con los datos de tu proyecto Supabase
   (Project Settings > API). Mientras no las rellenes, la app sigue
   funcionando solo con localStorage, como antes.
   ============================================================ */
var STORE_CONFIG = {
  url: "https://crnwaixkmduxnxgqpimb.supabase.co",
  anonKey: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNybndhaXhrbWR1eG54Z3FwaW1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0MTM2MTQsImV4cCI6MjA5ODk4OTYxNH0.SNSfEWX5G0gIDNBV_Qofxy7fXy05Csa_EKMLP7mohi0",
};

var SimpleGymStore = (function () {
  function isConfigured() {
    return STORE_CONFIG.url.indexOf("YOUR_SUPABASE_URL") === -1 &&
      STORE_CONFIG.anonKey.indexOf("YOUR_SUPABASE_ANON_KEY") === -1;
  }
  function localKey(userId) { return "simplegym_cache_" + userId; }
  function readLocalCache(userId) {
    try {
      var raw = localStorage.getItem(localKey(userId));
      return raw ? JSON.parse(raw) : null;
    } catch (e) { return null; }
  }
  function writeLocalCache(userId, data) {
    try { localStorage.setItem(localKey(userId), JSON.stringify(data)); } catch (e) {}
  }
  function legacyKeyFor(userId) {
    return userId === "nava" ? "planAnualProgresoV1" : "gymAmigoProgresoV1";
  }
  function readLegacy(userId) {
    try {
      var raw = localStorage.getItem(legacyKeyFor(userId));
      return raw ? JSON.parse(raw) : null;
    } catch (e) { return null; }
  }

  async function load(userId) {
    var cached = readLocalCache(userId) || readLegacy(userId);
    if (!isConfigured()) return cached;
    try {
      var res = await fetch(
        STORE_CONFIG.url + "/rest/v1/progress?id=eq." + encodeURIComponent(userId) + "&select=data",
        { headers: { apikey: STORE_CONFIG.anonKey, Authorization: "Bearer " + STORE_CONFIG.anonKey } }
      );
      if (!res.ok) throw new Error("HTTP " + res.status);
      var rows = await res.json();
      if (rows && rows.length && rows[0].data) {
        writeLocalCache(userId, rows[0].data);
        return rows[0].data;
      }
      return cached;
    } catch (e) {
      console.warn("SimpleGymStore: sin conexión con Supabase, uso caché local.", e);
      return cached;
    }
  }

  var pending = {};
  function save(userId, data) {
    writeLocalCache(userId, data);
    if (!isConfigured()) return;
    clearTimeout(pending[userId]);
    pending[userId] = setTimeout(function () {
      fetch(STORE_CONFIG.url + "/rest/v1/progress", {
        method: "POST",
        headers: {
          apikey: STORE_CONFIG.anonKey,
          Authorization: "Bearer " + STORE_CONFIG.anonKey,
          "Content-Type": "application/json",
          Prefer: "resolution=merge-duplicates",
        },
        body: JSON.stringify([{ id: userId, data: data, updated_at: new Date().toISOString() }]),
      }).catch(function (e) { console.warn("SimpleGymStore: no se pudo sincronizar con Supabase.", e); });
    }, 600);
  }

  return { load: load, save: save, isConfigured: isConfigured };
})();

window.nava_init = function (initialData) {

/* ============================================================

   ============================================================ */
var phases = [
  { id: 1, name: "Verano activo", tag: "Mantenimiento", start: "2026-07-06", end: "2026-08-31", color: "#FDBA74",
    desc: "Sin presión de progresar. Mantén los pesos que ya tienes, cuida la técnica y entrena cuando puedas. Si el 4º día no entra por vacaciones o calor, no pasa nada — el objetivo aquí es no perder el hábito." },

  { id: 6, name: "Navidad", tag: "Mantenimiento", start: "2026-12-08", end: "2027-01-04", color: "#38BDF8",
    desc: "Fiestas, viajes, comidas. Entrena cuando puedas con lo que tengas a mano. Nadie progresa en diciembre y está perfectamente bien." },
  { id: 7, name: "Bloque de fuerza II", tag: "Progresión", start: "2027-01-05", end: "2027-02-15", color: "#C8FF00",
    desc: "Nuevo ciclo de fuerza, ya con los pesos que mejoraste desde septiembre. Misma regla: completa las reps → sube peso." },
  { id: 8, name: "Descarga", tag: "Recuperación", start: "2027-02-16", end: "2027-02-22", color: "#94A3B8",

  { id: 12, name: "Cierre de año", tag: "Test de progreso", start: "2027-05-25", end: "2027-06-30", color: "#E879F9",
    desc: "Un año después: prueba con calma tus nuevos máximos en sentadilla, press banca, press militar y peso muerto rumano. Compara con julio de 2026 y date cuenta de lo lejos que has llegado." },
];

function getPhase(dateISO) {
  var t = new Date(dateISO + "T00:00:00").getTime();
  var first = new Date(phases[0].start + "T00:00:00").getTime();
  if (t < first) return phases[0];
  for (var i = 0; i < phases.length; i++) {
    var p = phases[i];
    var s = new Date(p.start + "T00:00:00").getTime();
    var e = new Date(p.end + "T23:59:59").getTime();
    if (t >= s && t <= e) return p;
  }
  return phases[phases.length - 1];
}
function getWeekNumber(dateISO) {
  var start = new Date(phases[0].start + "T00:00:00").getTime();
  var t = new Date(dateISO + "T00:00:00").getTime();
  var diff = Math.floor((t - start) / 86400000);
  return Math.min(52, Math.max(1, Math.floor(diff / 7) + 1));
}
function todayISO() { return new Date().toISOString().slice(0, 10); }
function formatDateEs(iso) {
  var d = new Date(iso + "T00:00:00");
  return d.toLocaleDateString("es-ES", { day: "2-digit", month: "short" });
}
function round(n) { return Math.round(n * 100) / 100; }

   ============================================================ */
var days = [
  {

    exercises: [
      { id: "lun-press-banca", name: "Press Banca Barra", muscle: "Pecho", trackable: true,

      { id: "lun-jalon-pecho", name: "Jalón al Pecho (agarre neutro)", muscle: "Espalda", trackable: true,

function buildDefaultProgress() {
  var exercises = {};
  days.forEach(function (day) {
    day.exercises.forEach(function (ex) {
      if (ex.trackable) exercises[ex.id] = { top: ex.baseTop, history: [] };
    });
  });
  return { exercises: exercises, overrides: {}, removed: {}, custom: {} };
}

function normalize(raw) {
  var def = buildDefaultProgress();
  var parsed = raw || {};
  return {
    exercises: Object.assign({}, def.exercises, parsed.exercises || {}),
    overrides: parsed.overrides || {},
    removed: parsed.removed || {},
    custom: parsed.custom || {},
  };
}

function esc(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
    return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
  });
}

function saveProgress(p) {
  progress = p;
  SimpleGymStore.save("nava", p);
}

function getPyramid(ex, prog) {
  if (!ex.trackable) return ex.staticPyramid;
  var entry = prog.exercises[ex.id];
  var top = entry ? entry.top : ex.baseTop;
  return ex.repsPattern.map(function (reps, i) {
    return { set: i + 1, reps: reps, weight: round(top + ex.offsets[i]) + " kg" };
  });
}

function findExercise(exId) {
  for (var d = 0; d < days.length; d++) {
    for (var e = 0; e < days[d].exercises.length; e++) {
      if (days[d].exercises[e].id === exId) return days[d].exercises[e];
    }
  }
  return null;
}

/* ---------------- EDICIÓN DE RUTINA (pesos, series, ejercicios) ---------------- */
function effectiveExercises(day, prog) {
  var list = [];
  day.exercises.forEach(function (ex) {
    if (prog.removed[ex.id]) return;
    list.push({ key: ex.id, base: ex, custom: false });
  });
  (prog.custom[day.id] || []).forEach(function (key) {
    list.push({ key: key, base: null, custom: true });
  });
  return list;
}

function getDisplayData(item, prog) {
  var ov = prog.overrides[item.key];
  if (ov) {
    return {
      name: ov.name,
      muscle: (item.base && item.base.muscle) || "Core",
      note: item.base ? item.base.note : "Ejercicio añadido por ti.",
      pyramid: ov.sets.map(function (s, i) { return { set: i + 1, reps: s.reps, weight: s.weight }; }),
      trackable: false,
    };
  }
  var ex = item.base;
  return { name: ex.name, muscle: ex.muscle, note: ex.note, pyramid: getPyramid(ex, prog), trackable: ex.trackable };
}

function ensureOverride(key) {
  if (!progress.overrides[key]) {
    var ex = findExercise(key);
    if (ex) {
      var basePyramid = getPyramid(ex, progress);
      progress.overrides[key] = {
        name: ex.name,
        sets: basePyramid.map(function (p) { return { reps: String(p.reps), weight: String(p.weight) }; }),
      };
    } else {
      progress.overrides[key] = { name: "Nuevo ejercicio", sets: [{ reps: "10", weight: "0 kg" }] };
    }
  }
  return progress.overrides[key];
}

function nava_toggleEditMode() { editMode = !editMode; render(); }

function nava_updateExerciseName(key, value) {
  var ov = ensureOverride(key);
  ov.name = value;
  saveProgress(progress);
  render();
}

function nava_updateSetField(key, idx, field, value) {
  var ov = ensureOverride(key);
  ov.sets[idx][field] = value;
  saveProgress(progress);
  render();
}

function nava_addSet(key) {
  var ov = ensureOverride(key);
  var last = ov.sets[ov.sets.length - 1] || { reps: "10", weight: "0 kg" };
  ov.sets.push({ reps: last.reps, weight: last.weight });
  saveProgress(progress);
  render();
}

function nava_removeSet(key, idx) {
  var ov = ensureOverride(key);
  if (ov.sets.length <= 1) { showToast("Debe quedar al menos 1 serie."); return; }
  ov.sets.splice(idx, 1);
  saveProgress(progress);
  render();
}

function nava_addExercise(dayId) {
  var id = "custom-" + dayId + "-" + Date.now();
  progress.overrides[id] = { name: "Nuevo ejercicio", sets: [{ reps: "10", weight: "0 kg" }] };
  if (!progress.custom[dayId]) progress.custom[dayId] = [];
  progress.custom[dayId].push(id);
  saveProgress(progress);
  expanded[dayId + "-" + id] = true;
  render();
}

function nava_removeExercise(key) {
  var ex = findExercise(key);
  if (ex) {
    progress.removed[key] = true;
  } else {
    progress.custom[activeDay] = (progress.custom[activeDay] || []).filter(function (k) { return k !== key; });
  }
  delete progress.overrides[key];
  saveProgress(progress);
  render();
}

function nava_restoreRemoved(dayId) {
  var day = days.filter(function (d) { return d.id === dayId; })[0];
  if (!day) return;
  day.exercises.forEach(function (ex) { delete progress.removed[ex.id]; });
  saveProgress(progress);
  render();
}

/* ---------------- ACTIONS ---------------- */
function nava_setActiveDay(id) { activeDay = id; expanded = {}; editingId = null; render(); }
function nava_toggleCheck(i) { var k = activeDay + "-" + i; checked[k] = !checked[k]; render(); }
function nava_toggleExpand(i) { var k = activeDay + "-" + i; expanded[k] = !expanded[k]; render(); }
function nava_togglePlan() { planOpen = !planOpen; render(); }
function nava_openLogger(exId) { editingId = exId; render(); }
function nava_cancelLogger() { editingId = null; render(); }

function showToast(msg) {
  toastMsg = msg;
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(function () { toastMsg = ""; render(); }, 3000);
  render();
}

function nava_saveLog(exId) {
  var ex = findExercise(exId);
  if (!ex) return;
  var wEl = document.getElementById("inp-weight");
  var rEl = document.getElementById("inp-reps");
  var w = parseFloat(String(wEl.value).replace(",", "."));
  var r = parseInt(rEl.value, 10);
  if (isNaN(w) || isNaN(r)) { showToast("Revisa los números introducidos."); return; }
  var targetReps = ex.repsPattern[ex.repsPattern.length - 1];
  var reached = r >= targetReps;
  var newTop = reached ? round(w + ex.step) : round(w);
  var prevEntry = progress.exercises[ex.id] || { top: ex.baseTop, history: [] };
  var newHistory = (prevEntry.history || []).concat([{ date: todayISO(), weight: w, reps: r }]).slice(-10);
  progress.exercises[ex.id] = { top: newTop, history: newHistory };
  saveProgress(progress);
  editingId = null;
  showToast(reached ? "Guardado ✓ Próxima vez: " + newTop + " kg" : "Guardado ✓ Repetimos " + newTop + " kg la próxima");
}

function nava_handleReset() {
  if (!confirmReset) {
    confirmReset = true;
    clearTimeout(confirmResetTimeout);
    confirmResetTimeout = setTimeout(function () { confirmReset = false; render(); }, 4000);
    render();
    return;
  }
  saveProgress(buildDefaultProgress());
  confirmReset = false;
  showToast("Progreso reiniciado.");
}

              '<span class="exname" style="color:' + (isDone ? "rgba(255,255,255,0.3)" : "#fff") + ";text-decoration:" + (isDone ? "line-through" : "none") + '">' + esc(data.name) + "</span>" +
              '<span class="muscletag" style="background:' + mc + "20;color:" + mc + '">' + esc(data.muscle).toUpperCase() + "</span>" +

          '<div class="exmeta">' + pyramid.length + " series · " + esc(pyramid[0].reps) + "→" + esc(pyramid[pyramid.length - 1].reps) + " reps" +

          "</div>" +
        "</div>" +
        '<div class="expbtn" style="transform:' + (isOpen ? "rotate(180deg)" : "rotate(0deg)") + '" onclick="nava_toggleExpand(\'' + key + '\')">' + CHEVRON_SVG + "</div>" +
      "</div>";

    if (isOpen) {
      html += '<div class="pyramid">';
      if (editMode) {
        html += '<div class="pyhead-edit"><span>SER</span><span>REPS</span><span>PESO</span><span></span></div>';
        pyramid.forEach(function (p, pi) {
          html += '<div class="pyrow-edit">' +
            '<span class="pyset" style="color:' + day.accent + '">' + p.set + "</span>" +
            '<input class="pysmallin" value="' + esc(p.reps) + '" onchange="nava_updateSetField(\'' + key + '\', ' + pi + ', \'reps\', this.value)">' +
            '<input class="pysmallin" value="' + esc(p.weight) + '" onchange="nava_updateSetField(\'' + key + '\', ' + pi + ', \'weight\', this.value)">' +
            '<div class="setdel" onclick="nava_removeSet(\'' + key + '\', ' + pi + ')">×</div>' +
          "</div>";

        pyramid.forEach(function (p, pi) {
          var intensity = Math.round(((pi + 1) / pyramid.length) * 100);
          var denom = (pyramid.length - 1) || 1;
          var opSet = 0.5 + (pi / denom) * 0.5;
          var opInt = 0.4 + (pi / denom) * 0.6;
          html += '<div class="pyrow">' +
            '<span class="pyset" style="color:' + day.accent + ";opacity:" + opSet + '">' + p.set + "</span>" +

            '<div class="logform-btn" style="background:' + day.accent + ';color:#000" onclick="nava_saveLog(\'' + key + '\')">Guardar</div>' +

    if (anyRemoved) {
      html += '<div class="restorebtn" onclick="nava_restoreRemoved(\'' + day.id + '\')">↺ Restaurar ejercicios eliminados de este día</div>';
    }

  var overviewRows = [
    { day: "Lunes", type: "Upper A", tag: "Fuerza", accent: "#C8FF00" },
    { day: "Martes", type: "Upper B", tag: "Hipertrofia", accent: "#FF6B35" },

  ];

  overviewRows.forEach(function (row) {
    var dim = row.accent === "#333" || row.accent === "#222";

      '<span class="overtag">' + row.tag + "</span></div></div>";
  });
  html += "</div>";

  /* progression rule */
  var ruleText = currentPhase.tag === "Mantenimiento"
    ? "Estás en fase de mantenimiento. No busques subir peso: repite lo que puedas, con buena técnica, sin agobios."
    : currentPhase.tag === "Recuperación"
    ? "Semana de descarga: baja el peso ~10% o quita una serie por ejercicio. Es parte del plan, no un retroceso."
    : 'Cuando completes todas las reps de la última serie → pulsa "Registrar" y sube el peso. Sin llegar al tope, repite el mismo peso. Así de simple.';

  html += '<div class="rulebox" style="background:' + day.accent + "10;border:1px solid " + day.accent + '25">' +
    '<div class="rulelabel" style="color:' + day.accent + '">REGLA DE PROGRESIÓN · ' + currentPhase.name.toUpperCase() + "</div>" +

  "</div>";

  html += '<div class="footer"><div class="resetlink" style="color:' + (confirmReset ? "#FF6B35" : "rgba(255,255,255,0.2)") + '" onclick="nava_handleReset()">' +

  html += "</div>";

  app.innerHTML = html;
}

var CUTOVER = "2026-09-15"; // mediados de septiembre: cambio de bloque

function todayISO() { return new Date().toISOString().slice(0, 10); }
function round(n) { return Math.round(n * 100) / 100; }

function buildDefaultProgress() {
  var exercises = {};
  blocks.forEach(function (b) {
    b.days.forEach(function (day) {
      day.exercises.forEach(function (ex) {
        if (ex.trackable) exercises[ex.id] = { top: ex.baseTop, history: [] };
      });
    });
  });
  return { exercises: exercises, overrides: {}, removed: {}, custom: {} };
}

function normalize(raw) {
  var def = buildDefaultProgress();
  var parsed = raw || {};
  return {
    exercises: Object.assign({}, def.exercises, parsed.exercises || {}),
    overrides: parsed.overrides || {},
    removed: parsed.removed || {},
    custom: parsed.custom || {},
  };
}

function esc(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
    return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
  });
}

function saveProgress(p) {
  progress = p;
  SimpleGymStore.save("cristian", p);
}

function getPyramid(ex, prog) {
  if (!ex.trackable) return ex.staticPyramid;
  var entry = prog.exercises[ex.id];
  var top = entry ? entry.top : ex.baseTop;
  return ex.repsPattern.map(function (reps, i) {
    return { set: i + 1, reps: reps, weight: round(top + ex.offsets[i]) + " kg" };
  });
}

function findExercise(exId) {
  for (var b = 0; b < blocks.length; b++) {
    for (var d = 0; d < blocks[b].days.length; d++) {
      for (var e = 0; e < blocks[b].days[d].exercises.length; e++) {
        if (blocks[b].days[d].exercises[e].id === exId) return blocks[b].days[d].exercises[e];
      }
    }
  }
  return null;
}

/* ---------------- STATE ---------------- */
var activeBlock = todayISO() < CUTOVER ? 0 : 1;
var activeDay = blocks[activeBlock].days[0].id;
var checked = {};
var expanded = {};
var progress = normalize(initialData);
var editingId = null;
var toastMsg = "";
var toastTimeout = null;
var planOpen = false;
var confirmReset = false;
var confirmResetTimeout = null;
var editMode = false;

/* ---------------- EDICIÓN DE RUTINA (pesos, series, ejercicios) ---------------- */
function effectiveExercises(day, prog) {
  var list = [];
  day.exercises.forEach(function (ex) {
    if (prog.removed[ex.id]) return;
    list.push({ key: ex.id, base: ex, custom: false });
  });
  (prog.custom[day.id] || []).forEach(function (key) {
    list.push({ key: key, base: null, custom: true });
  });
  return list;
}

function getDisplayData(item, prog) {
  var ov = prog.overrides[item.key];
  if (ov) {
    return {
      name: ov.name,
      muscle: (item.base && item.base.muscle) || "Core",
      note: item.base ? item.base.note : "Ejercicio añadido por ti.",
      pyramid: ov.sets.map(function (s, i) { return { set: i + 1, reps: s.reps, weight: s.weight }; }),
      trackable: false,
    };
  }
  var ex = item.base;
  return { name: ex.name, muscle: ex.muscle, note: ex.note, pyramid: getPyramid(ex, prog), trackable: ex.trackable };
}

function ensureOverride(key) {
  if (!progress.overrides[key]) {
    var ex = findExercise(key);
    if (ex) {
      var basePyramid = getPyramid(ex, progress);
      progress.overrides[key] = {
        name: ex.name,
        sets: basePyramid.map(function (p) { return { reps: String(p.reps), weight: String(p.weight) }; }),
      };
    } else {
      progress.overrides[key] = { name: "Nuevo ejercicio", sets: [{ reps: "10", weight: "0 kg" }] };
    }
  }
  return progress.overrides[key];
}

function cristian_toggleEditMode() { editMode = !editMode; render(); }

function cristian_updateExerciseName(key, value) {
  var ov = ensureOverride(key);
  ov.name = value;
  saveProgress(progress);
  render();
}

function cristian_updateSetField(key, idx, field, value) {
  var ov = ensureOverride(key);
  ov.sets[idx][field] = value;
  saveProgress(progress);
  render();
}

function cristian_addSet(key) {
  var ov = ensureOverride(key);
  var last = ov.sets[ov.sets.length - 1] || { reps: "10", weight: "0 kg" };
  ov.sets.push({ reps: last.reps, weight: last.weight });
  saveProgress(progress);
  render();
}

function cristian_removeSet(key, idx) {
  var ov = ensureOverride(key);
  if (ov.sets.length <= 1) { showToast("Debe quedar al menos 1 serie."); return; }
  ov.sets.splice(idx, 1);
  saveProgress(progress);
  render();
}

function cristian_addExercise(dayId) {
  var id = "custom-" + dayId + "-" + Date.now();
  progress.overrides[id] = { name: "Nuevo ejercicio", sets: [{ reps: "10", weight: "0 kg" }] };
  if (!progress.custom[dayId]) progress.custom[dayId] = [];
  progress.custom[dayId].push(id);
  saveProgress(progress);
  expanded[dayId + "-" + id] = true;
  render();
}

function cristian_removeExercise(key) {
  var ex = findExercise(key);
  if (ex) {
    progress.removed[key] = true;
  } else {
    progress.custom[activeDay] = (progress.custom[activeDay] || []).filter(function (k) { return k !== key; });
  }
  delete progress.overrides[key];
  saveProgress(progress);
  render();
}

function cristian_restoreRemoved(dayId) {
  var block = blocks[activeBlock];
  var day = block.days.filter(function (d) { return d.id === dayId; })[0];
  if (!day) return;
  day.exercises.forEach(function (ex) { delete progress.removed[ex.id]; });
  saveProgress(progress);
  render();
}

/* ---------------- ACTIONS ---------------- */
function cristian_setActiveBlock(i) {
  if (i === activeBlock) return;
  activeBlock = i;
  activeDay = blocks[i].days[0].id;
  checked = {}; expanded = {}; editingId = null;
  render();
}
function cristian_setActiveDay(id) { activeDay = id; expanded = {}; editingId = null; render(); }
function cristian_toggleCheck(i) { var k = activeDay + "-" + i; checked[k] = !checked[k]; render(); }
function cristian_toggleExpand(i) { var k = activeDay + "-" + i; expanded[k] = !expanded[k]; render(); }
function cristian_togglePlan() { planOpen = !planOpen; render(); }
function cristian_openLogger(exId) { editingId = exId; render(); }
function cristian_cancelLogger() { editingId = null; render(); }

function showToast(msg) {
  toastMsg = msg;
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(function () { toastMsg = ""; render(); }, 3000);
  render();
}

function cristian_saveLog(exId) {
  var ex = findExercise(exId);
  if (!ex) return;
  var wEl = document.getElementById("inp-weight");
  var rEl = document.getElementById("inp-reps");
  var w = parseFloat(String(wEl.value).replace(",", "."));
  var r = parseInt(rEl.value, 10);
  if (isNaN(w) || isNaN(r)) { showToast("Revisa los números introducidos."); return; }
  var targetReps = ex.repsPattern[ex.repsPattern.length - 1];
  var reached = r >= targetReps;
  var newTop = reached ? round(w + ex.step) : round(w);
  var prevEntry = progress.exercises[ex.id] || { top: ex.baseTop, history: [] };
  var newHistory = (prevEntry.history || []).concat([{ date: todayISO(), weight: w, reps: r }]).slice(-10);
  progress.exercises[ex.id] = { top: newTop, history: newHistory };
  saveProgress(progress);
  editingId = null;
  showToast(reached ? "Guardado ✓ Próxima vez: " + newTop + " kg" : "Guardado ✓ Repetimos " + newTop + " kg la próxima");
}

function cristian_handleReset() {
  if (!confirmReset) {
    confirmReset = true;
    clearTimeout(confirmResetTimeout);
    confirmResetTimeout = setTimeout(function () { confirmReset = false; render(); }, 4000);
    render();
    return;
  }
  saveProgress(buildDefaultProgress());
  confirmReset = false;
  showToast("Progreso reiniciado.");
}

/* ---------------- RENDER ---------------- */
function render() {
  var app = document.getElementById("app");
  var block = blocks[activeBlock];
  var accent = block.accent;
  var day = block.days.filter(function (d) { return d.id === activeDay; })[0] || block.days[0];
  var effList = effectiveExercises(day, progress);
  var done = effList.filter(function (item) { return checked[activeDay + "-" + item.key]; }).length;
  var total = effList.length;
  var pct = total ? Math.round((done / total) * 100) : 0;

  document.body.style.background = day.bg;

  var html = "";
  if (toastMsg) html += '<div class="toast">' + toastMsg + "</div>";
  html += '<div class="wrap">';

  /* header */
  html += '<div class="header">' +
    '<div class="glow" style="background:' + day.accent + '"></div>' +
    '<div class="eyebrow">GANAR MÚSCULO · QUEMAR GRASA</div>' +
    '<div class="title">PUSH·PULL<br><span style="color:' + accent + '">LEGS</span></div>' +
    '<div class="subtitle">' + block.period + " · " + block.days.length + " días de gimnasio</div>";

  /* block switcher */
  html += '<div class="blockswitch">';
  blocks.forEach(function (b, bi) {
    var on = bi === activeBlock;
    html += '<div class="blockpill" style="background:' + (on ? b.accent + "22" : "rgba(255,255,255,0.04)") +
      ";border:1px solid " + (on ? b.accent + "66" : "rgba(255,255,255,0.08)") + '" onclick="cristian_setActiveBlock(' + bi + ')">' +
      '<div class="bp-name" style="color:' + (on ? b.accent : "rgba(255,255,255,0.6)") + '">' + b.name + "</div>" +
      '<div class="bp-sub" style="color:rgba(255,255,255,0.4)">' + b.tabsub + "</div>" +
    "</div>";
  });
  html += "</div>";

  /* goal pill */
  html += '<div class="phasepill" style="background:' + accent + "15;border:1px solid " + accent + '40" onclick="cristian_togglePlan()">' +
    '<span class="dot" style="background:' + accent + '"></span>' +
    '<span style="font-size:12px;font-weight:700;color:' + accent + '">Objetivo y carrera</span>' +
    '<span class="chevron' + (planOpen ? " open" : "") + '">' + CHEVRON_SVG + "</span>" +
  "</div>";

  if (planOpen) {
    html += '<div class="planpanel" style="border:1px solid ' + accent + '30">' +
      '<div class="plandesc">' + block.goal + "</div>" +
      '<div class="planlabel">CARRERA</div>' +
      '<div class="runbox"><div class="runtext">' + block.run + "</div></div>" +
      '<div class="planlabel">TU PLAN EN 2 BLOQUES</div>';
    blocks.forEach(function (b, bi) {
      var isCur = bi === activeBlock;
      html += '<div class="phaserow" style="opacity:' + (isCur ? 1 : 0.55) + '">' +
        '<div class="phaseleft">' +
          '<span class="dot" style="background:' + b.accent + '"></span>' +
          '<span class="phasename' + (isCur ? " current" : "") + '">' + b.name + "</span>" +
          (isCur ? '<span class="heretag" style="color:' + b.accent + '">ACTIVO</span>' : "") +
        "</div>" +
        '<span class="phasedate">' + b.period + "</span>" +
      "</div>";
    });
    html += "</div>";
  }

  /* weekpills */
  html += '<div class="weekpills">';
  block.week.forEach(function (w) {
    var isActive = w.id === activeDay;
    var bg = isActive ? accent : (w.active ? "rgba(255,255,255,0.07)" : "transparent");
    var color = isActive ? "#000" : (w.active ? "rgba(255,255,255,0.5)" : "rgba(255,255,255,0.15)");
    var border = isActive ? "none" : (w.active ? "1px solid rgba(255,255,255,0.1)" : "none");
    var cursor = w.active ? "pointer" : "default";
    var click = (w.active && w.id) ? ' onclick="cristian_setActiveDay(\'' + w.id + '\')"' : "";
    html += '<div class="daybtn" style="background:' + bg + ";color:" + color + ";border:" + border + ";cursor:" + cursor + '"' + click + ">" + w.label + "</div>";
  });
  html += "</div></div>";

  /* day card */
  html += '<div class="daycard-wrap"><div class="daycard" style="border:1px solid ' + day.accent + '30">' +
    '<div class="daycard-top"><div>' +
      '<div class="typebadge" style="background:' + day.accent + "20;border:1px solid " + day.accent + '40">' +
        '<span class="t1" style="color:' + day.accent + '">' + day.type + "</span>" +
        '<span class="sep" style="background:' + day.accent + '"></span>' +
        '<span class="t2" style="color:' + day.accent + '">' + day.tag.toUpperCase() + "</span>" +
      "</div>" +
      '<div class="dayname">' + day.fullName + "</div>" +
      '<div class="daysub">' + day.subtitle + "</div>" +
    "</div>" +
    '<div class="pctbox">' +
      '<div class="pctnum" style="color:' + ((done === total && done > 0) ? day.accent : "rgba(255,255,255,0.2)") + '">' + pct + "%</div>" +
      '<div class="pctlabel">' + done + "/" + total + " HECHOS</div>" +
    "</div></div>" +
    '<div class="barbg"><div class="barfill" style="width:' + pct + "%;background:linear-gradient(90deg, " + day.accent + "aa, " + day.accent + ')"></div></div>' +
    '<div class="focus">' + day.focus + "</div>" +
    '<div class="editbar"><div class="editbtn" style="background:' + (editMode ? day.accent : "rgba(255,255,255,0.06)") + ";color:" + (editMode ? "#000" : "rgba(255,255,255,0.5)") + '" onclick="cristian_toggleEditMode()">' + (editMode ? "✓ Listo" : "✎ Editar rutina") + "</div></div>" +
  "</div></div>";

  /* exercises */
  html += '<div class="exlist">';
  effList.forEach(function (item) {
    var key = item.key;
    var data = getDisplayData(item, progress);
    var stateKey = activeDay + "-" + key;
    var isDone = checked[stateKey];
    var isOpen = expanded[stateKey];
    var mc = muscleColors[data.muscle] || "#888";
    var pyramid = data.pyramid;
    var entry = data.trackable ? progress.exercises[key] : null;
    var lastLog = entry && entry.history.length ? entry.history[entry.history.length - 1] : null;
    var isEditingLog = editingId === key;

    html += '<div class="excard" style="background:' + (isDone ? "rgba(255,255,255,0.02)" : "rgba(255,255,255,0.05)") +
      ";border:1px solid " + (isDone ? "rgba(255,255,255,0.05)" : "rgba(255,255,255,0.09)") + ";opacity:" + (isDone ? 0.45 : 1) + '">' +
      '<div class="exhead">' +
        '<div class="chk" style="border:2px solid ' + (isDone ? day.accent : "rgba(255,255,255,0.15)") + ";background:" + (isDone ? day.accent : "transparent") + '" onclick="cristian_toggleCheck(\'' + key + '\')">' + (isDone ? CHECK_SVG : "") + "</div>" +
        '<div class="exinfo" onclick="cristian_toggleExpand(\'' + key + '\')">' +
          (editMode ?
            '<div class="exname-row">' +
              '<input class="exname-input" value="' + esc(data.name) + '" onchange="cristian_updateExerciseName(\'' + key + '\', this.value)" onclick="event.stopPropagation()">' +
              '<span class="muscletag" style="background:' + mc + "20;color:" + mc + '">' + esc(data.muscle).toUpperCase() + "</span>" +
            "</div>"
            :
            '<div class="exname-row">' +
              '<span class="exname" style="color:' + (isDone ? "rgba(255,255,255,0.3)" : "#fff") + ";text-decoration:" + (isDone ? "line-through" : "none") + '">' + esc(data.name) + "</span>" +
              '<span class="muscletag" style="background:' + mc + "20;color:" + mc + '">' + esc(data.muscle).toUpperCase() + "</span>" +
            "</div>"
          ) +
          '<div class="exmeta">' + pyramid.length + " series · " + esc(pyramid[0].reps) + "→" + esc(pyramid[pyramid.length - 1].reps) + " reps" +
            (lastLog ? " · Últ: " + lastLog.weight + " kg×" + lastLog.reps : "") +
          "</div>" +
        "</div>" +
        '<div class="expbtn" style="transform:' + (isOpen ? "rotate(180deg)" : "rotate(0deg)") + '" onclick="cristian_toggleExpand(\'' + key + '\')">' + CHEVRON_SVG + "</div>" +
      "</div>";

    if (isOpen) {
      html += '<div class="pyramid">';
      if (editMode) {
        html += '<div class="pyhead-edit"><span>SER</span><span>REPS</span><span>PESO / MOV.</span><span></span></div>';
        pyramid.forEach(function (p, pi) {
          html += '<div class="pyrow-edit">' +
            '<span class="pyset" style="color:' + day.accent + '">' + p.set + "</span>" +
            '<input class="pysmallin" value="' + esc(p.reps) + '" onchange="cristian_updateSetField(\'' + key + '\', ' + pi + ', \'reps\', this.value)">' +
            '<input class="pysmallin" value="' + esc(p.weight) + '" onchange="cristian_updateSetField(\'' + key + '\', ' + pi + ', \'weight\', this.value)">' +
            '<div class="setdel" onclick="cristian_removeSet(\'' + key + '\', ' + pi + ')">×</div>' +
          "</div>";
        });
        html += '<div class="addsetbtn" onclick="cristian_addSet(\'' + key + '\')">+ Añadir serie</div>';
      } else {
        html += '<div class="pyhead"><span>SER</span><span>REPS</span><span>PESO / MOV.</span><span style="text-align:right">INT.</span></div>';
        pyramid.forEach(function (p, pi) {
          var intensity = Math.round(((pi + 1) / pyramid.length) * 100);
          var denom = (pyramid.length - 1) || 1;
          var opSet = 0.5 + (pi / denom) * 0.5;
          var opInt = 0.4 + (pi / denom) * 0.6;
          html += '<div class="pyrow">' +
            '<span class="pyset" style="color:' + day.accent + ";opacity:" + opSet + '">' + p.set + "</span>" +
            '<span class="pyreps">' + esc(p.reps) + "</span>" +
            '<span class="pyweight">' + esc(p.weight) + "</span>" +
            '<div class="pyint"><span style="color:' + day.accent + ";opacity:" + opInt + '">' + (data.trackable ? intensity + "%" : "—") + "</span></div>" +
          "</div>";
        });
      }
      html += '<div class="tip">' + esc(data.note) + "</div>";

      if (editMode) {
        html += '<div class="exdelbtn" onclick="cristian_removeExercise(\'' + key + '\')">🗑 Eliminar este ejercicio</div>';
      } else if (data.trackable) {
        html += '<div class="logwrap">';
        if (!isEditingLog) {
          html += '<div class="logbtn" style="background:' + day.accent + "15;border:1px solid " + day.accent + "35;color:" + day.accent + '" onclick="cristian_openLogger(\'' + key + '\')">✎ Registrar lo que hiciste hoy</div>';
        } else {
          html += '<div class="logform-row">' +
            '<div class="logform-col"><div class="logform-label">PESO (KG)</div>' +
              '<input id="inp-weight" class="numin" type="number" inputmode="decimal" step="0.5" value="' + entry.top + '"></div>' +
            '<div class="logform-col"><div class="logform-label">REPS EN LA ÚLTIMA SERIE</div>' +
              '<input id="inp-reps" class="numin" type="number" inputmode="numeric" step="1" value="' + item.base.repsPattern[item.base.repsPattern.length - 1] + '"></div>' +
          "</div>" +
          '<div class="logform-actions">' +
            '<div class="logform-btn" style="background:' + day.accent + ';color:#000" onclick="cristian_saveLog(\'' + key + '\')">Guardar</div>' +
            '<div class="logform-btn" style="background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.6)" onclick="cristian_cancelLogger()">Cancelar</div>' +
          "</div>";
        }
        html += "</div>";
      }
      html += "</div>";
    }
    html += "</div>";
  });
  if (editMode) {
    var anyRemoved = day.exercises.some(function (ex) { return progress.removed[ex.id]; });
    if (anyRemoved) {
      html += '<div class="restorebtn" onclick="cristian_restoreRemoved(\'' + day.id + '\')">↺ Restaurar ejercicios eliminados de este día</div>';
    }
    html += '<div class="addexbtn" onclick="cristian_addExercise(\'' + day.id + '\')">+ Añadir ejercicio</div>';
  }
  html += "</div>";

  /* weekly overview */
  html += '<div class="overview"><div class="overview-title">VISIÓN SEMANAL · ' + block.name.toUpperCase() + "</div>";
  block.overview.forEach(function (row) {
    var dim = row.accent === "#333" || row.accent === "#222";
    html += '<div class="overow"><div class="overleft"><span class="overdot" style="background:' + row.accent + '"></span>' +
      '<span class="overday" style="color:' + (dim ? "rgba(255,255,255,0.3)" : "rgba(255,255,255,0.8)") + '">' + row.day + "</span></div>" +
      '<div><span class="overtype" style="color:' + (dim ? "rgba(255,255,255,0.3)" : row.accent) + '">' + row.type + "</span>" +
      '<span class="overtag">' + row.tag + "</span></div></div>";
  });
  html += "</div>";

  /* progression rule */
  html += '<div class="rulebox" style="background:' + accent + "10;border:1px solid " + accent + '25">' +
    '<div class="rulelabel" style="color:' + accent + '">REGLA DE PROGRESIÓN · ' + block.name.toUpperCase() + "</div>" +
    '<div class="ruletext">' + block.rule + "</div>" +
  "</div>";

  /* footer */
  html += '<div class="footer"><div class="resetlink" style="color:' + (confirmReset ? "#FF6B35" : "rgba(255,255,255,0.2)") + '" onclick="cristian_handleReset()">' +
    (confirmReset ? "¿Seguro? Toca de nuevo para reiniciar" : "Reiniciar progreso guardado") +
  '</div><div class="resetlink" onclick="switchUser()">Cambiar de usuario</div></div>';

  html += "</div>";
  app.innerHTML = html;
}

  window.cristian_togglePlan = cristian_togglePlan;
  window.cristian_setActiveDay = cristian_setActiveDay;
  window.cristian_toggleCheck = cristian_toggleCheck;
  window.cristian_toggleExpand = cristian_toggleExpand;
  window.cristian_toggleEditMode = cristian_toggleEditMode;
  window.cristian_updateExerciseName = cristian_updateExerciseName;
  window.cristian_updateSetField = cristian_updateSetField;
  window.cristian_removeSet = cristian_removeSet;
  window.cristian_addSet = cristian_addSet;
  window.cristian_removeExercise = cristian_removeExercise;
  window.cristian_addExercise = cristian_addExercise;
  window.cristian_restoreRemoved = cristian_restoreRemoved;
  window.cristian_openLogger = cristian_openLogger;
  window.cristian_saveLog = cristian_saveLog;
  window.cristian_cancelLogger = cristian_cancelLogger;
  window.cristian_handleReset = cristian_handleReset;
  window.cristian_setActiveBlock = cristian_setActiveBlock;
  render();
};

/* ============================================================
   SELECCIÓN DE USUARIO Y ARRANQUE
   ============================================================ */
var USER_META = {
  nava: { label: "Nava", sub: "3 Upper · 1 Pierna", color: "#C8FF00" },
  cristian: { label: "Cristian", sub: "PPL · Recomp", color: "#38BDF8" },
};

function getStoredUser() {
  try { return localStorage.getItem("simplegym_current_user") || ""; } catch (e) { return ""; }
}
function setStoredUser(u) {
  try { localStorage.setItem("simplegym_current_user", u); } catch (e) {}
}
function paramUser() {
  var m = /[?&]u=(nava|cristian)/.exec(location.search);
  return m ? m[1] : "";
}

function renderUserPicker() {
  var app = document.getElementById("app");
  var html = '<div class="userpick">' +
    '<div class="eyebrow">SIMPLEGYM</div>' +
    '<div class="userpick-title">¿Quién entrena hoy?</div>' +
    '<div class="userpick-row">';
  Object.keys(USER_META).forEach(function (id) {
    var u = USER_META[id];
    html += '<div class="userpick-btn" style="background:' + u.color + '15;border:1px solid ' + u.color + '55" onclick="chooseUser(\'' + id + '\')">' +
      '<div style="font-size:18px;font-weight:800;color:' + u.color + '">' + u.label + '</div>' +
      '<div style="font-size:11px;color:rgba(255,255,255,0.4);margin-top:4px">' + u.sub + '</div>' +
    '</div>';
  });
  html += '</div><div class="userpick-note">Se recuerda en este dispositivo. Puedes cambiar de usuario luego desde el pie de la página.</div></div>';
  app.innerHTML = html;
}

window.chooseUser = function (id) {
  setStoredUser(id);
  boot(id);
};
window.switchUser = function () {
  setStoredUser("");
  renderUserPicker();
};

async function boot(forceUser) {
  var user = forceUser || paramUser() || getStoredUser();
  if (!user || !USER_META[user]) { renderUserPicker(); return; }
  setStoredUser(user);
  document.getElementById("app").innerHTML = '<div class="loading">CARGANDO…</div>';
  var data = await SimpleGymStore.load(user);
  if (user === "nava") window.nava_init(data);
  else window.cristian_init(data);
}

boot();
</script>
</body>
</html>
