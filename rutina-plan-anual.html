function getPhase(dateISO) {
  var t = new Date(dateISO + "T00:00:00").getTime();
  var first = new Date(phases[0].start + "T00:00:00").getTime();
  if (t < first) return phases[0];
  for (var i = 0; i < phases.length; i++) {
    var p = phases[i];
    var s = new Date(p.start + "T00:00:00").getTime();
    var e = new Date(p.end + "T23:59:59").getTime();
    if (t >= s && t <= e) return p;
  }
  return phases[phases.length - 1];
}
function getWeekNumber(dateISO) {
  var start = new Date(phases[0].start + "T00:00:00").getTime();
  var t = new Date(dateISO + "T00:00:00").getTime();
  var diff = Math.floor((t - start) / 86400000);
  return Math.min(52, Math.max(1, Math.floor(diff / 7) + 1));
}
function todayISO() { return new Date().toISOString().slice(0, 10); }
function formatDateEs(iso) {
  var d = new Date(iso + "T00:00:00");
  return d.toLocaleDateString("es-ES", { day: "2-digit", month: "short" });
}
function round(n) { return Math.round(n * 100) / 100; }

      { id: "vie-face-pull", name: "Face Pull Polea", muscle: "Hombro post.", trackable: true,
        repsPattern: [15, 15, 12], offsets: [-5, -2, 0], baseTop: 20, step: 2.5,
        note: "Salud del manguito rotador. No lo saltes nunca — previene lesiones." },
      { id: "vie-cruces-polea", name: "Cruces Polea Baja", muscle: "Pecho sup.", trackable: true,
        repsPattern: [15, 12, 10], offsets: [-2.5, -0.5, 0], baseTop: 7.5, step: 1,
        note: "Tira hacia arriba y al centro. Estiramiento máximo abajo." },
      { id: "vie-curl-martillo", name: "Curl Martillo con Cuerda (polea)", muscle: "Bíceps", trackable: true,
        repsPattern: [15, 12, 10], offsets: [-5, -2, 0], baseTop: 30, step: 1.25,
        note: "Separa las manos arriba. Trabaja braquial y braquiorradial." },
      { id: "vie-patada-triceps", name: "Patada de Tríceps (mancuerna)", muscle: "Tríceps", trackable: true,
        repsPattern: [15, 12, 10], offsets: [-2, 0, 0], baseTop: 8, step: 1,
        note: "Codo fijo. Contracción total al final. Aprieta 1 seg." },
      { id: "vie-rueda-abdominal", name: "Rueda Abdominal", muscle: "Core", trackable: false,
        staticPyramid: [
          { set: 1, reps: "10", weight: "—" },
          { set: 2, reps: "10", weight: "—" },
          { set: 3, reps: "8", weight: "—" } ],
        note: "Estiramiento controlado. No arquees la espalda baja." },
    ],
  },
];

var weekDaysList = [
  { label: "L", id: "lunes", active: true },
  { label: "M", id: "martes", active: true },
  { label: "X", active: false },
  { label: "J", id: "jueves", active: true },
  { label: "V", id: "viernes", active: true },
  { label: "S", active: false },
  { label: "D", active: false },
];

var muscleColors = {
  "Pecho": "#FF6B35", "Pecho sup.": "#FF6B35",
  "Espalda": "#C8FF00",
  "Hombro": "#38BDF8", "Hombro lat.": "#38BDF8", "Hombro post.": "#38BDF8",
  "Bíceps": "#E879F9", "Tríceps": "#E879F9",
  "Cuádriceps": "#FB923C", "Isquios": "#FB923C",
  "Gemelos": "#34D399", "Core": "#94A3B8",
};

var CHECK_SVG = '<svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4.5L4 7.5L10 1" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
var CHEVRON_SVG = '<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 4.5L6 8L10 4.5" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';

var STORAGE_KEY = "planAnualProgresoV1";

function buildDefaultProgress() {
  var exercises = {};
  days.forEach(function (day) {
    day.exercises.forEach(function (ex) {
      if (ex.trackable) exercises[ex.id] = { top: ex.baseTop, history: [] };
    });
  });
  return { exercises: exercises };
}

function loadProgress() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      var parsed = JSON.parse(raw);
      var def = buildDefaultProgress();
      parsed.exercises = Object.assign({}, def.exercises, parsed.exercises || {});
      return parsed;
    }
  } catch (e) { console.error("No se pudo leer el progreso guardado", e); }
  return buildDefaultProgress();
}

function saveProgress(p) {
  progress = p;
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); }
  catch (e) { console.error("No se pudo guardar el progreso", e); }
}

function getPyramid(ex, prog) {
  if (!ex.trackable) return ex.staticPyramid;
  var entry = prog.exercises[ex.id];
  var top = entry ? entry.top : ex.baseTop;
  return ex.repsPattern.map(function (reps, i) {
    return { set: i + 1, reps: reps, weight: round(top + ex.offsets[i]) + " kg" };
  });
}

function findExercise(exId) {
  for (var d = 0; d < days.length; d++) {
    for (var e = 0; e < days[d].exercises.length; e++) {
      if (days[d].exercises[e].id === exId) return days[d].exercises[e];
    }
  }
  return null;
}

/* ---------------- STATE ---------------- */
var activeDay = "lunes";
var checked = {};
var expanded = {};
var progress = loadProgress();
var editingId = null;
var toastMsg = "";
var toastTimeout = null;
var planOpen = false;
var confirmReset = false;
var confirmResetTimeout = null;

/* ---------------- ACTIONS ---------------- */
function setActiveDay(id) { activeDay = id; expanded = {}; editingId = null; render(); }
function toggleCheck(i) { var k = activeDay + "-" + i; checked[k] = !checked[k]; render(); }
function toggleExpand(i) { var k = activeDay + "-" + i; expanded[k] = !expanded[k]; render(); }
function togglePlan() { planOpen = !planOpen; render(); }
function openLogger(exId) { editingId = exId; render(); }
function cancelLogger() { editingId = null; render(); }

function showToast(msg) {
  toastMsg = msg;
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(function () { toastMsg = ""; render(); }, 3000);
  render();
}

function saveLog(exId) {
  var ex = findExercise(exId);
  if (!ex) return;
  var wEl = document.getElementById("inp-weight");
  var rEl = document.getElementById("inp-reps");
  var w = parseFloat(String(wEl.value).replace(",", "."));
  var r = parseInt(rEl.value, 10);
  if (isNaN(w) || isNaN(r)) { showToast("Revisa los números introducidos."); return; }
  var targetReps = ex.repsPattern[ex.repsPattern.length - 1];
  var reached = r >= targetReps;
  var newTop = reached ? round(w + ex.step) : round(w);
  var prevEntry = progress.exercises[ex.id] || { top: ex.baseTop, history: [] };
  var newHistory = (prevEntry.history || []).concat([{ date: todayISO(), weight: w, reps: r }]).slice(-10);
  progress.exercises[ex.id] = { top: newTop, history: newHistory };
  saveProgress(progress);
  editingId = null;
  showToast(reached ? "Guardado ✓ Próxima vez: " + newTop + " kg" : "Guardado ✓ Repetimos " + newTop + " kg la próxima");
}

function handleReset() {
  if (!confirmReset) {
    confirmReset = true;
    clearTimeout(confirmResetTimeout);
    confirmResetTimeout = setTimeout(function () { confirmReset = false; render(); }, 4000);
    render();
    return;
  }
  saveProgress(buildDefaultProgress());
  confirmReset = false;
  showToast("Progreso reiniciado.");
}

/* ---------------- RENDER ---------------- */
function render() {
  var app = document.getElementById("app");
  var today = todayISO();
  var currentPhase = getPhase(today);
  var weekNumber = getWeekNumber(today);
  var day = days.filter(function (d) { return d.id === activeDay; })[0];
  var done = day.exercises.filter(function (_, i) { return checked[activeDay + "-" + i]; }).length;
  var total = day.exercises.length;
  var pct = Math.round((done / total) * 100);

  document.body.style.background = day.bg;

  var html = "";

  if (toastMsg) html += '<div class="toast">' + toastMsg + "</div>";

  html += '<div class="wrap">';

  /* header */
  html += '<div class="header">' +
    '<div class="glow" style="background:' + day.accent + '"></div>' +
    '<div class="eyebrow">ESPECIALIZACIÓN TREN SUPERIOR · PLAN 1 AÑO</div>' +
    '<div class="title">3 UPPER<br><span style="color:' + day.accent + '">1 PIERNA</span></div>' +
    '<div class="subtitle">Julio 2026 → Junio 2027 · Semana ' + weekNumber + ' de 52</div>' +
    '<div class="phasepill" style="background:' + currentPhase.color + '15;border:1px solid ' + currentPhase.color + '40" onclick="togglePlan()">' +
      '<span class="dot" style="background:' + currentPhase.color + '"></span>' +
      '<span style="font-size:12px;font-weight:700;color:' + currentPhase.color + '">' + currentPhase.name + "</span>" +
      '<span style="font-size:10px;color:rgba(255,255,255,0.35)">· ' + currentPhase.tag + "</span>" +
      '<span class="chevron' + (planOpen ? " open" : "") + '">' + CHEVRON_SVG + "</span>" +
    "</div>";

  if (planOpen) {
    html += '<div class="planpanel" style="border:1px solid ' + currentPhase.color + '30">' +
      '<div class="plandesc">' + currentPhase.desc + "</div>" +
      '<div class="planlabel">LAS 12 FASES DEL AÑO</div>';
    phases.forEach(function (p) {
      var isCurrent = p.id === currentPhase.id;
      html += '<div class="phaserow" style="opacity:' + (isCurrent ? 1 : 0.55) + '">' +
        '<div class="phaseleft">' +
          '<span class="dot" style="background:' + p.color + '"></span>' +
          '<span class="phasename' + (isCurrent ? " current" : "") + '">' + p.name + "</span>" +
          (isCurrent ? '<span class="heretag" style="color:' + p.color + '">ESTÁS AQUÍ</span>' : "") +
        "</div>" +
        '<span class="phasedate">' + formatDateEs(p.start) + " – " + formatDateEs(p.end) + "</span>" +
      "</div>";
    });
    html += "</div>";
  }

  html += '<div class="weekpills">';
  weekDaysList.forEach(function (w) {
    var isActive = w.id === activeDay;
    var bg = isActive ? day.accent : (w.active ? "rgba(255,255,255,0.07)" : "transparent");
    var color = isActive ? "#000" : (w.active ? "rgba(255,255,255,0.5)" : "rgba(255,255,255,0.15)");
    var border = isActive ? "none" : (w.active ? "1px solid rgba(255,255,255,0.1)" : "none");
    var cursor = w.active ? "pointer" : "default";
    var click = (w.active && w.id) ? ' onclick="setActiveDay(\'' + w.id + '\')"' : "";
    html += '<div class="daybtn" style="background:' + bg + ";color:" + color + ";border:" + border + ";cursor:" + cursor + '"' + click + ">" + w.label + "</div>";
  });
  html += "</div></div>";

  /* day card */
  html += '<div class="daycard-wrap"><div class="daycard" style="border:1px solid ' + day.accent + '30">' +
    '<div class="daycard-top"><div>' +
      '<div class="typebadge" style="background:' + day.accent + "20;border:1px solid " + day.accent + '40">' +
        '<span class="t1" style="color:' + day.accent + '">' + day.type + "</span>" +
        '<span class="sep" style="background:' + day.accent + '"></span>' +
        '<span class="t2" style="color:' + day.accent + '">' + day.tag.toUpperCase() + "</span>" +
      "</div>" +
      '<div class="dayname">' + day.fullName + "</div>" +
      '<div class="daysub">' + day.subtitle + "</div>" +
    "</div>" +
    '<div class="pctbox">' +
      '<div class="pctnum" style="color:' + ((done === total && done > 0) ? day.accent : "rgba(255,255,255,0.2)") + '">' + pct + "%</div>" +
      '<div class="pctlabel">' + done + "/" + total + " HECHOS</div>" +
    "</div></div>" +
    '<div class="barbg"><div class="barfill" style="width:' + pct + "%;background:linear-gradient(90deg, " + day.accent + "aa, " + day.accent + ')"></div></div>' +
    '<div class="focus">' + day.focus + "</div>" +
  "</div></div>";

  /* exercises */
  html += '<div class="exlist">';
  day.exercises.forEach(function (ex, i) {
    var key = activeDay + "-" + i;
    var isDone = checked[key];
    var isOpen = expanded[key];
    var mc = muscleColors[ex.muscle] || "#888";
    var pyramid = getPyramid(ex, progress);
    var entry = ex.trackable ? progress.exercises[ex.id] : null;
    var lastLog = entry && entry.history.length ? entry.history[entry.history.length - 1] : null;
    var isEditing = editingId === ex.id;

    html += '<div class="excard" style="background:' + (isDone ? "rgba(255,255,255,0.02)" : "rgba(255,255,255,0.05)") +
      ";border:1px solid " + (isDone ? "rgba(255,255,255,0.05)" : "rgba(255,255,255,0.09)") + ";opacity:" + (isDone ? 0.45 : 1) + '">' +
      '<div class="exhead">' +
        '<div class="chk" style="border:2px solid ' + (isDone ? day.accent : "rgba(255,255,255,0.15)") + ";background:" + (isDone ? day.accent : "transparent") + '" onclick="toggleCheck(' + i + ')">' + (isDone ? CHECK_SVG : "") + "</div>" +
        '<div class="exinfo" onclick="toggleExpand(' + i + ')">' +
          '<div class="exname-row">' +
            '<span class="exname" style="color:' + (isDone ? "rgba(255,255,255,0.3)" : "#fff") + ";text-decoration:" + (isDone ? "line-through" : "none") + '">' + ex.name + "</span>" +
            '<span class="muscletag" style="background:' + mc + "20;color:" + mc + '">' + ex.muscle.toUpperCase() + "</span>" +
          "</div>" +
          '<div class="exmeta">' + pyramid.length + " series · " + pyramid[0].reps + "→" + pyramid[pyramid.length - 1].reps + " reps" +
            (lastLog ? " · Últ: " + lastLog.weight + " kg×" + lastLog.reps + " (" + formatDateEs(lastLog.date) + ")" : "") +
          "</div>" +
        "</div>" +
        '<div class="expbtn" style="transform:' + (isOpen ? "rotate(180deg)" : "rotate(0deg)") + '" onclick="toggleExpand(' + i + ')">' + CHEVRON_SVG + "</div>" +
      "</div>";

    if (isOpen) {
      html += '<div class="pyramid"><div class="pyhead"><span>SER</span><span>REPS</span><span>PESO</span><span style="text-align:right">INT.</span></div>';
      pyramid.forEach(function (p, pi) {
        var intensity = Math.round(((pi + 1) / pyramid.length) * 100);
        var denom = (pyramid.length - 1) || 1;
        var opSet = 0.5 + (pi / denom) * 0.5;
        var opInt = 0.4 + (pi / denom) * 0.6;
        html += '<div class="pyrow">' +
          '<span class="pyset" style="color:' + day.accent + ";opacity:" + opSet + '">' + p.set + "</span>" +
          '<span class="pyreps">' + p.reps + "</span>" +
          '<span class="pyweight">' + p.weight + "</span>" +
          '<div class="pyint"><span style="color:' + day.accent + ";opacity:" + opInt + '">' + intensity + "%</span></div>" +
        "</div>";
      });
      html += '<div class="tip">' + ex.note + "</div>";

      if (ex.trackable) {
        html += '<div class="logwrap">';
        if (!isEditing) {
          html += '<div class="logbtn" style="background:' + day.accent + "15;border:1px solid " + day.accent + "35;color:" + day.accent + '" onclick="openLogger(\'' + ex.id + '\')">✎ Registrar lo que hiciste hoy</div>';
        } else {
          html += '<div class="logform-row">' +
            '<div class="logform-col"><div class="logform-label">PESO (KG)</div>' +
              '<input id="inp-weight" class="numin" type="number" inputmode="decimal" step="0.5" value="' + entry.top + '"></div>' +
            '<div class="logform-col"><div class="logform-label">REPS EN LA ÚLTIMA SERIE</div>' +
              '<input id="inp-reps" class="numin" type="number" inputmode="numeric" step="1" value="' + ex.repsPattern[ex.repsPattern.length - 1] + '"></div>' +
          "</div>" +
          '<div class="logform-actions">' +
            '<div class="logform-btn" style="background:' + day.accent + ';color:#000" onclick="saveLog(\'' + ex.id + '\')">Guardar</div>' +
            '<div class="logform-btn" style="background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.6)" onclick="cancelLogger()">Cancelar</div>' +
          "</div>";
        }
        html += "</div>";
      }
      html += "</div>";
    }
    html += "</div>";
  });
  html += "</div>";

  /* weekly overview */
  var overviewRows = [
    { day: "Lunes", type: "Upper A", tag: "Fuerza", accent: "#C8FF00" },
    { day: "Martes", type: "Upper B", tag: "Hipertrofia", accent: "#FF6B35" },
    { day: "Miércoles", type: "Descanso", tag: "Cardio opcional", accent: "#333" },
    { day: "Jueves", type: "Pierna", tag: "Completa", accent: "#38BDF8" },
    { day: "Viernes", type: "Upper C", tag: "4º día · opcional", accent: "#E879F9" },
    { day: "Sábado", type: "Descanso", tag: "Cardio opcional", accent: "#333" },
    { day: "Domingo", type: "Descanso", tag: "Recuperación", accent: "#222" },
  ];
  html += '<div class="overview"><div class="overview-title">VISIÓN SEMANAL</div>';
  overviewRows.forEach(function (row) {
    var dim = row.accent === "#333" || row.accent === "#222";
    html += '<div class="overow"><div class="overleft"><span class="overdot" style="background:' + row.accent + '"></span>' +
      '<span class="overday" style="color:' + (dim ? "rgba(255,255,255,0.2)" : "rgba(255,255,255,0.8)") + '">' + row.day + "</span></div>" +
      '<div><span class="overtype" style="color:' + (dim ? "rgba(255,255,255,0.2)" : row.accent) + '">' + row.type + "</span>" +
      '<span class="overtag">' + row.tag + "</span></div></div>";
  });
  html += "</div>";

  /* progression rule */
  var ruleText = currentPhase.tag === "Mantenimiento"
    ? "Estás en fase de mantenimiento. No busques subir peso: repite lo que puedas, con buena técnica, sin agobios."
    : currentPhase.tag === "Recuperación"
    ? "Semana de descarga: baja el peso ~10% o quita una serie por ejercicio. Es parte del plan, no un retroceso."
    : 'Cuando completes todas las reps de la última serie → pulsa "Registrar" y sube el peso. Sin llegar al tope, repite el mismo peso. Así de simple.';

  html += '<div class="rulebox" style="background:' + day.accent + "10;border:1px solid " + day.accent + '25">' +
    '<div class="rulelabel" style="color:' + day.accent + '">REGLA DE PROGRESIÓN · ' + currentPhase.name.toUpperCase() + "</div>" +
    '<div class="ruletext">' + ruleText + "</div>" +
  "</div>";

  /* footer */
  html += '<div class="footer"><div class="resetlink" style="color:' + (confirmReset ? "#FF6B35" : "rgba(255,255,255,0.2)") + '" onclick="handleReset()">' +
    (confirmReset ? "¿Seguro? Toca de nuevo para reiniciar" : "Reiniciar progreso guardado") +
  "</div></div>";

  html += "</div>";

  app.innerHTML = html;
}

render();
</script>
</body>
</html>
